<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CO-30 QRラベル印刷</title>
  <!--
    QRコード生成: 外部ライブラリなし・純粋なJavaScriptで実装
    (CDNブロック・API廃止の影響を受けない完全自己完結版)
  -->
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f7; margin: 0; padding: 0; color: #333;
    }
    .header {
      background: #2c5f8a; color: #fff;
      padding: 14px 20px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .header h1 { margin: 0; font-size: 16px; font-weight: bold; }
    .header .sub { font-size: 12px; opacity: 0.8; margin-top: 2px; }
    .filter-bar {
      background: #fff; padding: 12px 20px;
      border-bottom: 1px solid #dde3e9;
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    }
    .filter-bar select, .filter-bar input[type="text"] {
      font: inherit; font-size: 13px;
      border: 1px solid #dde3e9; border-radius: 8px;
      padding: 6px 10px; background: #fff;
    }
    .filter-bar input[type="text"] { min-width: 180px; }
    .filter-count { font-size: 12px; color: #888; margin-left: auto; }
    .btn-print {
      background: #2c5f8a; color: #fff; border: none;
      border-radius: 8px; padding: 8px 18px;
      font-size: 14px; font-weight: bold; cursor: pointer;
    }
    .btn-print:hover { background: #1d4566; }
    .loading {
      text-align: center; padding: 60px 20px;
      color: #f39c12; font-size: 16px; font-weight: bold;
    }
    .preview-area { padding: 20px; }
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: #aaa; font-size: 14px;
    }

    /* ===== 画面表示 ===== */
    @media screen {
      .label-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px; max-width: 900px; margin: 0 auto;
      }
      .label-item {
        background: #fff; border: 1px dashed #bbb;
        border-radius: 6px; padding: 8px;
        display: flex; flex-direction: column;
        align-items: center; gap: 4px; min-height: 100px;
      }
      .label-item canvas { width: 80px; height: 80px; }
    }

    /* ===== 印刷レイアウト ===== */
    @media print {
      @page { size: A4; margin: 8mm; }
      body { background: #fff; }
      .print-hide { display: none !important; }
      .preview-area { padding: 0; }
      .label-grid {
        display: grid;
        grid-template-columns: repeat(4, 47mm);
        gap: 0; width: 188mm; margin: 0 auto;
      }
      .label-item {
        width: 47mm; height: 47mm;
        border: 0.3pt dashed #aaa;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 2mm; padding: 3mm;
        page-break-inside: avoid; overflow: hidden;
      }
      .label-item canvas { width: 20mm !important; height: 20mm !important; }
    }

    .label-code {
      font-family: "SF Mono", "Consolas", monospace;
      font-size: 10px; font-weight: bold;
      text-align: center; color: #222;
      word-break: break-all; line-height: 1.3;
    }
    @media print { .label-code { font-size: 6pt; } }
  </style>
</head>
<body>

<div class="header print-hide">
  <h1>🏷️ CO-30 QRラベル印刷</h1>
  <div class="sub">物品に貼り付けるQRコードラベルを印刷します</div>
</div>

<div class="filter-bar print-hide">
  <select id="f-location"><option value="">拠点: すべて</option></select>
  <select id="f-team">
    <option value="">担当TM: すべて</option>
    <option value="運送">🚛 運送TM</option>
    <option value="レンタル">🏢 レンタルTM</option>
  </select>
  <input type="text" id="f-search" placeholder="🔍 物品コード・物品名で検索">
  <span class="filter-count" id="filter-count"></span>
  <button class="btn-print" onclick="window.print()">🖨️ 印刷</button>
</div>

<div class="loading print-hide" id="loading">⏳ データを取得中...</div>
<div class="preview-area" id="preview-area" style="display:none;">
  <div class="label-grid" id="label-grid"></div>
</div>

<script>
/* =========================================================
   設定
   ========================================================= */
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxNEE_cTr3b_M3yyra5Qd3BON-FXkhPv7Qp22IGrkEEwQq7S8j7p6eWUdalxA-V_eeT/exec";

/* =========================================================
   QRコード生成(純粋なJavaScript実装・外部依存なし)
   Reed-Solomon誤り訂正 + QRコードパターン生成を内包
   ========================================================= */
var QRCodeGen = (function() {
  // QRコードの数字/英字/バイナリを自動判別してcanvasに描画する
  // 参考実装: https://github.com/nayuki/QR-Code-generator (MIT License)

  var QRC = {};

  var qrcodegen = (function() {
    "use strict";

    function QrCode(version, errorCorrectionLevel, dataCodewords, mask) {
      this.version = version;
      this.errorCorrectionLevel = errorCorrectionLevel;
      this.mask = mask;
      this.size = version * 4 + 17;
      var self = this;
      this.modules = [];
      this.isFunction = [];
      for (var i = 0; i < this.size; i++) {
        this.modules.push([]);
        this.isFunction.push([]);
        for (var j = 0; j < this.size; j++) {
          this.modules[i].push(false);
          this.isFunction[i].push(false);
        }
      }
      this.drawFunctionPatterns();
      var allCodewords = this.addEccAndInterleave(dataCodewords);
      this.drawCodewords(allCodewords);
      this.applyMask(mask);
      this.drawFormatBits(mask);
    }

    QrCode.encodeText = function(text, ecl) {
      var segs = QrSegment.makeSegments(text);
      return QrCode.encodeSegments(segs, ecl);
    };

    QrCode.encodeSegments = function(segs, ecl, minVersion, maxVersion, mask, boostEcl) {
      if (minVersion === undefined) minVersion = 1;
      if (maxVersion === undefined) maxVersion = 40;
      if (mask === undefined) mask = -1;
      if (boostEcl === undefined) boostEcl = true;

      var version, dataUsedBits;
      for (version = minVersion; ; version++) {
        var dataCapacityBits = QrCode.getNumDataCodewords(version, ecl) * 8;
        dataUsedBits = QrSegment.getTotalBits(segs, version);
        if (dataUsedBits <= dataCapacityBits) break;
        if (version >= maxVersion) throw new RangeError("Data too long");
      }

      if (boostEcl) {
        for (var newEcl of [QrCode.Ecc.MEDIUM, QrCode.Ecc.QUARTILE, QrCode.Ecc.HIGH]) {
          if (dataUsedBits <= QrCode.getNumDataCodewords(version, newEcl) * 8)
            ecl = newEcl;
        }
      }

      var bb = new BitBuffer();
      for (var seg of segs) {
        bb.appendBits(seg.mode.modeBits, 4);
        bb.appendBits(seg.numChars, seg.mode.numCharCountBits(version));
        for (var b of seg.getData()) bb.push(b);
      }

      var dataCapacityBits = QrCode.getNumDataCodewords(version, ecl) * 8;
      bb.appendBits(0, Math.min(4, dataCapacityBits - bb.length));
      bb.appendBits(0, (8 - bb.length % 8) % 8);
      for (var padByte = 0xEC; bb.length < dataCapacityBits; padByte ^= 0xEC ^ 0x11)
        bb.appendBits(padByte, 8);

      var dataCodewords = [];
      while (dataCodewords.length * 8 < bb.length) dataCodewords.push(0);
      bb.forEach(function(b, i) { dataCodewords[i >>> 3] |= b << (7 - (i & 7)); });

      if (mask === -1) {
        var minPenalty = Infinity;
        for (var msk = 0; msk < 8; msk++) {
          var qr = new QrCode(version, ecl, dataCodewords, msk);
          var penalty = qr.getPenaltyScore();
          if (penalty < minPenalty) { minPenalty = penalty; mask = msk; }
        }
      }
      return new QrCode(version, ecl, dataCodewords, mask);
    };

    QrCode.prototype.getModule = function(x, y) {
      return 0 <= x && x < this.size && 0 <= y && y < this.size && this.modules[y][x];
    };

    QrCode.prototype.drawCanvas = function(scale, border, canvas) {
      var size = this.size + border * 2;
      canvas.width = canvas.height = size * scale;
      var ctx = canvas.getContext("2d");
      ctx.fillStyle = "#FFFFFF";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#000000";
      for (var y = -border; y < this.size + border; y++) {
        for (var x = -border; x < this.size + border; x++) {
          if (this.getModule(x, y)) {
            ctx.fillRect((x + border) * scale, (y + border) * scale, scale, scale);
          }
        }
      }
    };

    // --- 内部メソッド群 ---
    QrCode.prototype.drawFunctionPatterns = function() {
      var self = this;
      for (var i = 0; i < this.size; i++) {
        this.setFunctionModule(6, i, i % 2 === 0);
        this.setFunctionModule(i, 6, i % 2 === 0);
      }
      this.drawFinderPattern(3, 3);
      this.drawFinderPattern(this.size - 4, 3);
      this.drawFinderPattern(3, this.size - 4);
      var alignPatPos = this.getAlignmentPatternPositions();
      var numAlign = alignPatPos.length;
      for (var i = 0; i < numAlign; i++) {
        for (var j = 0; j < numAlign; j++) {
          if (!((i === 0 && j === 0) || (i === 0 && j === numAlign-1) || (i === numAlign-1 && j === 0)))
            this.drawAlignmentPattern(alignPatPos[i], alignPatPos[j]);
        }
      }
      this.drawFormatBits(0);
      this.drawVersion();
    };

    QrCode.prototype.drawFormatBits = function(mask) {
      var data = this.errorCorrectionLevel.formatBits << 3 | mask;
      var rem = data;
      for (var i = 0; i < 10; i++) rem = (rem << 1) ^ ((rem >>> 9) * 0x537);
      var bits = (data << 10 | rem) ^ 0x5412;
      for (var i = 0; i <= 5; i++) this.setFunctionModule(8, i, getBit(bits, i));
      this.setFunctionModule(8, 7, getBit(bits, 6));
      this.setFunctionModule(8, 8, getBit(bits, 7));
      this.setFunctionModule(7, 8, getBit(bits, 8));
      for (var i = 9; i < 15; i++) this.setFunctionModule(14-i, 8, getBit(bits, i));
      for (var i = 0; i < 8; i++) this.setFunctionModule(this.size-1-i, 8, getBit(bits, i));
      for (var i = 8; i < 15; i++) this.setFunctionModule(8, this.size-15+i, getBit(bits, i));
      this.setFunctionModule(8, this.size-8, true);
    };

    QrCode.prototype.drawVersion = function() {
      if (this.version < 7) return;
      var rem = this.version;
      for (var i = 0; i < 12; i++) rem = (rem << 1) ^ ((rem >>> 11) * 0x1F25);
      var bits = this.version << 12 | rem;
      for (var i = 0; i < 18; i++) {
        var a = this.size - 11 + i % 3, b = Math.floor(i / 3);
        this.setFunctionModule(a, b, getBit(bits, i));
        this.setFunctionModule(b, a, getBit(bits, i));
      }
    };

    QrCode.prototype.drawFinderPattern = function(x, y) {
      for (var dy = -4; dy <= 4; dy++) {
        for (var dx = -4; dx <= 4; dx++) {
          var dist = Math.max(Math.abs(dx), Math.abs(dy));
          var xx = x + dx, yy = y + dy;
          if (0 <= xx && xx < this.size && 0 <= yy && yy < this.size)
            this.setFunctionModule(xx, yy, dist !== 2 && dist !== 4);
        }
      }
    };

    QrCode.prototype.drawAlignmentPattern = function(x, y) {
      for (var dy = -2; dy <= 2; dy++)
        for (var dx = -2; dx <= 2; dx++)
          this.setFunctionModule(x + dx, y + dy, Math.max(Math.abs(dx), Math.abs(dy)) !== 1);
    };

    QrCode.prototype.setFunctionModule = function(x, y, isDark) {
      this.modules[y][x] = isDark;
      this.isFunction[y][x] = true;
    };

    QrCode.prototype.addEccAndInterleave = function(data) {
      var version = this.version, ecl = this.errorCorrectionLevel;
      if (data.length !== QrCode.getNumDataCodewords(version, ecl)) throw new RangeError("Invalid argument");
      var numBlocks = QrCode.NUM_ERROR_CORRECTION_BLOCKS[ecl.ordinal][version];
      var blockEccLen = QrCode.ECC_CODEWORDS_PER_BLOCK[ecl.ordinal][version];
      var rawCodewords = Math.floor(QrCode.getNumRawDataModules(version) / 8);
      var numShortBlocks = numBlocks - rawCodewords % numBlocks;
      var shortBlockLen = Math.floor(rawCodewords / numBlocks);
      var blocks = [], k = 0;
      var rsDiv = reedSolomonComputeDivisor(blockEccLen);
      for (var i = 0; i < numBlocks; i++) {
        var datLen = shortBlockLen - blockEccLen + (i < numShortBlocks ? 0 : 1);
        var dat = data.slice(k, k + datLen); k += datLen;
        var ecc = reedSolomonComputeRemainder(dat, rsDiv);
        if (i < numShortBlocks) dat.push(0);
        blocks.push(dat.concat(ecc));
      }
      var result = [];
      for (var i = 0; i < blocks[0].length; i++)
        for (var j = 0; j < blocks.length; j++)
          if (i !== shortBlockLen - blockEccLen || j >= numShortBlocks)
            result.push(blocks[j][i]);
      return result;
    };

    QrCode.prototype.drawCodewords = function(data) {
      var i = 0;
      for (var right = this.size - 1; right >= 1; right -= 2) {
        if (right === 6) right = 5;
        for (var vert = 0; vert < this.size; vert++) {
          for (var j = 0; j < 2; j++) {
            var x = right - j, upward = ((right + 1) & 2) === 0, y = upward ? this.size - 1 - vert : vert;
            if (!this.isFunction[y][x] && i < data.length * 8) {
              this.modules[y][x] = getBit(data[i >>> 3], 7 - (i & 7));
              i++;
            }
          }
        }
      }
    };

    QrCode.prototype.applyMask = function(mask) {
      for (var y = 0; y < this.size; y++) {
        for (var x = 0; x < this.size; x++) {
          var invert;
          switch (mask) {
            case 0: invert = (x + y) % 2 === 0; break;
            case 1: invert = y % 2 === 0; break;
            case 2: invert = x % 3 === 0; break;
            case 3: invert = (x + y) % 3 === 0; break;
            case 4: invert = (Math.floor(x / 3) + Math.floor(y / 2)) % 2 === 0; break;
            case 5: invert = x * y % 2 + x * y % 3 === 0; break;
            case 6: invert = (x * y % 2 + x * y % 3) % 2 === 0; break;
            case 7: invert = ((x + y) % 2 + x * y % 3) % 2 === 0; break;
            default: throw new RangeError("No such mask");
          }
          if (!this.isFunction[y][x] && invert) this.modules[y][x] = !this.modules[y][x];
        }
      }
    };

    QrCode.prototype.getPenaltyScore = function() {
      var result = 0, self = this;
      function runHistory(hist) {
        if (hist.length >= 7 && hist[hist.length-7] === hist[hist.length-1] * 4 &&
            hist[hist.length-6] === hist[hist.length-1] && hist[hist.length-5] === hist[hist.length-1] * 3 &&
            hist[hist.length-4] === hist[hist.length-1] && hist[hist.length-3] === hist[hist.length-1] &&
            hist[hist.length-2] === hist[hist.length-1] * 4) result += 40;
        return result;
      }
      for (var y = 0; y < this.size; y++) {
        var runColor = false, runX = 0, runY = 0;
        var runXHist = [0,0,0,0,0,0,0], runYHist = [0,0,0,0,0,0,0];
        for (var x = 0; x < this.size; x++) {
          if (this.modules[y][x] === runColor) {
            runX++;
            if (runX === 5) result += 3;
            else if (runX > 5) result++;
          } else { runColor = this.modules[y][x]; runX = 1; }
          if (this.modules[x][y] === (runYHist.length > 0 ? runColor : !this.modules[x][y])) {
          }
          if (x + 1 < this.size && y + 1 < this.size) {
            var color = this.modules[y][x];
            if (color === this.modules[y][x+1] && color === this.modules[y+1][x] && color === this.modules[y+1][x+1])
              result += 3;
          }
        }
      }
      var dark = 0;
      for (var y = 0; y < this.size; y++) for (var x = 0; x < this.size; x++) if (this.modules[y][x]) dark++;
      var total = this.size * this.size;
      var k = Math.ceil(Math.abs(dark * 20 - total * 10) / total) - 1;
      result += k * 10;
      return result;
    };

    QrCode.prototype.getAlignmentPatternPositions = function() {
      var ver = this.version;
      if (ver === 1) return [];
      var numAlign = Math.floor(ver / 7) + 2;
      var step = (ver === 32) ? 26 : Math.ceil((ver * 4 + 4) / (numAlign * 2 - 2)) * 2;
      var result = [6];
      for (var pos = this.size - 7; result.length < numAlign; pos -= step) result.splice(1, 0, pos);
      return result;
    };

    QrCode.getNumRawDataModules = function(ver) {
      var result = (16 * ver + 128) * ver + 64;
      if (ver >= 2) { var numAlign = Math.floor(ver / 7) + 2; result -= (25 * numAlign - 10) * numAlign - 55; if (ver >= 7) result -= 36; }
      return result;
    };

    QrCode.getNumDataCodewords = function(ver, ecl) {
      return Math.floor(QrCode.getNumRawDataModules(ver) / 8) -
        QrCode.ECC_CODEWORDS_PER_BLOCK[ecl.ordinal][ver] * QrCode.NUM_ERROR_CORRECTION_BLOCKS[ecl.ordinal][ver];
    };

    function getBit(x, i) { return ((x >>> i) & 1) !== 0; }

    function reedSolomonComputeDivisor(degree) {
      var result = new Array(degree).fill(0); result[degree-1] = 1;
      var root = 1;
      for (var i = 0; i < degree; i++) {
        for (var j = 0; j < result.length; j++) {
          result[j] = reedSolomonMultiply(result[j], root);
          if (j + 1 < result.length) result[j] ^= result[j+1];
        }
        root = reedSolomonMultiply(root, 0x02);
      }
      return result;
    }

    function reedSolomonComputeRemainder(data, divisor) {
      var result = new Array(divisor.length).fill(0);
      for (var b of data) {
        var factor = b ^ result.shift(); result.push(0);
        for (var i = 0; i < divisor.length; i++) result[i] ^= reedSolomonMultiply(divisor[i], factor);
      }
      return result;
    }

    function reedSolomonMultiply(x, y) {
      var z = 0;
      for (var i = 7; i >= 0; i--) { z = (z << 1) ^ ((z >>> 7) * 0x11D); z ^= ((y >>> i) & 1) * x; }
      return z;
    }

    QrCode.Ecc = {
      LOW:      { ordinal: 0, formatBits: 1 },
      MEDIUM:   { ordinal: 1, formatBits: 0 },
      QUARTILE: { ordinal: 2, formatBits: 3 },
      HIGH:     { ordinal: 3, formatBits: 2 },
    };

    QrCode.ECC_CODEWORDS_PER_BLOCK = [
      [-1,7,10,15,20,26,18,20,24,30,18,20,24,26,30,22,24,28,30,28,28,28,28,30,30,26,28,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30],
      [-1,10,16,26,18,24,16,18,22,22,26,30,22,22,24,24,28,28,26,26,26,26,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28],
      [-1,13,22,18,26,18,24,18,22,20,24,28,26,24,20,30,24,28,28,26,30,28,30,30,30,30,28,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30],
      [-1,17,28,22,16,22,28,26,26,24,28,24,28,22,24,24,30,28,28,26,28,30,24,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30],
    ];

    QrCode.NUM_ERROR_CORRECTION_BLOCKS = [
      [-1,1,1,1,1,1,2,2,2,2,4,4,4,4,4,6,6,6,6,7,8,8,9,9,10,12,12,12,13,14,15,16,17,18,19,19,20,21,22,24,25,26,28,29,31],
      [-1,1,1,1,2,2,4,4,4,5,5,5,8,9,9,10,10,11,13,14,16,17,17,18,20,21,23,25,26,28,29,31,33,35,37,38,40,43,45,47,49,52,54,57,60],
      [-1,1,1,2,2,4,4,6,6,8,8,8,10,12,16,12,17,16,18,21,20,23,23,25,27,29,34,34,35,38,40,43,45,48,51,53,56,59,62,65,68,72,74,76,80],
      [-1,1,1,2,4,4,4,5,6,8,8,11,11,16,16,18,16,19,21,25,25,25,34,30,32,35,37,40,42,45,48,51,54,57,60,63,66,70,74,77,81,85,89,93,97],
    ];

    // QrSegment
    var QrSegment = {};

    QrSegment.makeBytes = function(data) {
      var bb = new BitBuffer();
      for (var b of data) bb.appendBits(b, 8);
      return new QrSegment(QrSegment.Mode.BYTE, data.length, bb.data);
    };

    QrSegment.makeSegments = function(text) {
      if (text === "") return [];
      if (QrSegment.NUMERIC_REGEX.test(text)) return [QrSegment.makeNumeric(text)];
      if (QrSegment.ALPHANUMERIC_REGEX.test(text)) return [QrSegment.makeAlphanumeric(text)];
      var bytes = [];
      for (var i = 0; i < text.length; i++) {
        var c = text.charCodeAt(i);
        if (c < 0x80) bytes.push(c);
        else if (c < 0x800) { bytes.push(0xC0 | (c >> 6)); bytes.push(0x80 | (c & 0x3F)); }
        else { bytes.push(0xE0 | (c >> 12)); bytes.push(0x80 | ((c >> 6) & 0x3F)); bytes.push(0x80 | (c & 0x3F)); }
      }
      return [QrSegment.makeBytes(bytes)];
    };

    QrSegment.makeNumeric = function(digits) {
      var bb = new BitBuffer();
      for (var i = 0; i < digits.length; ) {
        var n = Math.min(digits.length - i, 3);
        bb.appendBits(parseInt(digits.substring(i, i+n), 10), [0,4,7,10][n]); i += n;
      }
      return new QrSegment(QrSegment.Mode.NUMERIC, digits.length, bb.data);
    };

    QrSegment.makeAlphanumeric = function(text) {
      var bb = new BitBuffer();
      var ALPHANUMERIC_CHARSET = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ $%*+-./:";
      for (var i = 0; i + 2 <= text.length; i += 2)
        bb.appendBits(ALPHANUMERIC_CHARSET.indexOf(text[i]) * 45 + ALPHANUMERIC_CHARSET.indexOf(text[i+1]), 11);
      if (text.length % 2 > 0) bb.appendBits(ALPHANUMERIC_CHARSET.indexOf(text[text.length-1]), 6);
      return new QrSegment(QrSegment.Mode.ALPHANUMERIC, text.length, bb.data);
    };

    QrSegment.getTotalBits = function(segs, version) {
      var result = 0;
      for (var seg of segs) {
        var ccbits = seg.mode.numCharCountBits(version);
        if (seg.numChars >= (1 << ccbits)) return Infinity;
        result += 4 + ccbits + seg.getData().length;
      }
      return result;
    };

    QrSegment.NUMERIC_REGEX = /^[0-9]*$/;
    QrSegment.ALPHANUMERIC_REGEX = /^[0-9A-Z $%*+\-./:]*$/;

    function QrSegment(mode, numChars, data) {
      this.mode = mode; this.numChars = numChars; this._data = data;
    }
    QrSegment.prototype.getData = function() { return this._data.slice(); };

    QrSegment.Mode = {
      NUMERIC:      { modeBits: 0x1, numCharCountBits: function(ver) { return ver < 10 ? 10 : ver < 27 ? 12 : 14; } },
      ALPHANUMERIC: { modeBits: 0x2, numCharCountBits: function(ver) { return ver < 10 ?  9 : ver < 27 ? 11 : 13; } },
      BYTE:         { modeBits: 0x4, numCharCountBits: function(ver) { return ver < 10 ?  8 : 16; } },
      KANJI:        { modeBits: 0x8, numCharCountBits: function(ver) { return ver < 10 ?  8 : ver < 27 ? 10 : 12; } },
    };

    function BitBuffer() { this.data = []; this.length = 0; }
    BitBuffer.prototype.appendBits = function(val, len) {
      for (var i = len - 1; i >= 0; i--) { this.data.push((val >>> i) & 1); this.length++; }
    };
    BitBuffer.prototype.push = function(b) { this.data.push(b); this.length++; };
    BitBuffer.prototype.forEach = function(fn) { this.data.forEach(fn); };

    return { QrCode: QrCode };
  })();

  QRC.drawToCanvas = function(canvas, text, scale, border) {
    scale = scale || 4; border = border || 2;
    try {
      var qr = qrcodegen.QrCode.encodeText(text, qrcodegen.QrCode.Ecc.MEDIUM);
      qr.drawCanvas(scale, border, canvas);
    } catch(e) {
      var ctx = canvas.getContext("2d");
      canvas.width = canvas.height = 80;
      ctx.fillStyle = "#eee"; ctx.fillRect(0,0,80,80);
      ctx.fillStyle = "#666"; ctx.font = "9px sans-serif";
      ctx.fillText("QR生成失敗", 8, 40);
    }
  };

  return QRC;
})();

/* =========================================================
   データ・フィルター・描画
   ========================================================= */
const GAS_API_URL2 = GAS_API_URL; // エイリアス
var allItems = [];

async function loadData() {
  try {
    var u = new URL(GAS_API_URL);
    u.searchParams.set('action', 'getInspectionData');
    u.searchParams.set('location', '');
    u.searchParams.set('team', '');
    var res = await fetch(u.toString());
    var json = await res.json();
    var raw = Array.isArray(json) ? json : (json.all || json.display || []);
    var seen = new Set();
    allItems = raw.filter(function(item) {
      if (seen.has(item.code)) return false;
      seen.add(item.code); return true;
    });
    buildLocationOptions();
    render();
  } catch(err) {
    document.getElementById('loading').innerText = '❌ データ取得エラー: ' + err.message;
  }
}

function buildLocationOptions() {
  var locs = Array.from(new Set(allItems.map(function(i){return i.location;}).filter(Boolean))).sort();
  var sel = document.getElementById('f-location');
  locs.forEach(function(loc) {
    var opt = document.createElement('option');
    opt.value = loc; opt.textContent = '拠点: ' + loc;
    sel.appendChild(opt);
  });
}

function getFiltered() {
  var loc    = document.getElementById('f-location').value;
  var team   = document.getElementById('f-team').value;
  var search = document.getElementById('f-search').value.trim().toLowerCase();
  return allItems.filter(function(item) {
    if (loc    && item.location !== loc)  return false;
    if (team   && item.team    !== team)  return false;
    if (search) {
      var hay = (item.code + ' ' + item.name).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
}

function render() {
  var items = getFiltered();
  document.getElementById('filter-count').textContent = items.length + ' 枚';
  document.getElementById('loading').style.display = 'none';
  var grid = document.getElementById('label-grid');
  var area = document.getElementById('preview-area');
  grid.innerHTML = '';
  if (items.length === 0) {
    area.style.display = 'block';
    grid.innerHTML = '<div class="empty-state">該当する物品がありません</div>';
    return;
  }
  area.style.display = 'block';
  items.forEach(function(item) {
    var div = document.createElement('div');
    div.className = 'label-item';

    var canvas = document.createElement('canvas');
    QRCodeGen.drawToCanvas(canvas, item.code, 3, 1);
    div.appendChild(canvas);

    var code = document.createElement('div');
    code.className = 'label-code';
    code.textContent = item.code;
    div.appendChild(code);

    grid.appendChild(div);
  });
}

['f-location','f-team'].forEach(function(id) {
  document.getElementById(id).addEventListener('change', render);
});
document.getElementById('f-search').addEventListener('input', render);

loadData();
</script>
