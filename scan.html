<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CO-30 現場検品スキャナー</title>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f4f6f7;
      margin: 0;
      padding: 0;
      color: #333;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .header-panel {
      background-color: #f39c12;
      color: #fff;
      padding: 12px 15px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 3px 6px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; flex-direction: column; gap: 2px; }
    .header-title { font-size: 14px; font-weight: bold; }
    .header-team {
      font-size: 11px;
      background: rgba(255,255,255,0.25);
      padding: 2px 8px;
      border-radius: 10px;
      display: inline-block;
      width: fit-content;
    }
    .header-team.transport { background: #2ecc71; }
    .header-team.rental { background: #3498db; }
    .header-team.both { background: #9b59b6; }
    .header-counter { display: flex; align-items: center; gap: 8px; }
    .counter-badge {
      background: #fff;
      color: #f39c12;
      font-size: 22px;
      font-weight: bold;
      padding: 4px 14px;
      border-radius: 8px;
      min-width: 40px;
      text-align: center;
    }

    .location-bar {
      background-color: #eeb95d;
      color: #fff;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: bold;
      text-align: center;
    }

    .item-list-container {
      padding: 12px;
      padding-bottom: 160px; /* 🆕 下部固定スキャンボタンの分の余白 */
    }
    .empty-hint {
      text-align: center; color: #aaa;
      padding: 40px 20px; font-size: 14px; line-height: 1.6;
    }
    .item-card {
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 6px solid #ccc;
      transition: opacity 0.15s;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .item-card.completed { border-left-color: #2ecc71; background-color: #f0fff5; }
    .item-card.syncing { opacity: 0.5; }
    .item-card.latest { border-left-color: #f39c12; box-shadow: 0 2px 8px rgba(243,156,18,0.3); }
    .item-info { flex: 1; }
    .item-name { font-size: 16px; font-weight: bold; margin-bottom: 4px; }
    .item-code { font-size: 11px; color: #7f8c8d; }
    .item-status-text { font-size: 12px; font-weight: bold; margin-top: 4px; }
    .status-wait { color: #e67e22; }
    .status-ok { color: #2ecc71; }
    .qty-controls {
      display: flex; align-items: center; gap: 6px;
      background: #f0f3f4; padding: 5px 10px; border-radius: 24px;
    }
    .btn-qty {
      background: #fff; border: 1px solid #bdc3c7;
      width: 40px; height: 40px; border-radius: 50%;
      font-size: 18px; font-weight: bold;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-qty:disabled { opacity: 0.4; }
    .qty-display { font-size: 16px; font-weight: bold; min-width: 48px; text-align: center; }

    /* =========================================================
       🆕 下部固定スキャンボタンエリア(レジゴー風)
       ========================================================= */
    .scan-dock {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(to top, rgba(244,246,247,1) 0%, rgba(244,246,247,1) 60%, rgba(244,246,247,0) 100%);
      padding: 30px 14px 18px 14px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }
    .btn-scan-bottom {
      background: #f39c12;
      color: #fff;
      border: none;
      font-size: 18px;
      font-weight: bold;
      padding: 22px 30px;
      border-radius: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 16px rgba(243,156,18,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-scan-bottom:active { transform: scale(0.97); opacity: 0.9; }
    .btn-scan-bottom .icon { font-size: 24px; }
    .btn-manual-mini {
      background: rgba(0,0,0,0.06);
      color: #555;
      border: none;
      font-size: 12px;
      padding: 8px 16px;
      border-radius: 18px;
      font-weight: bold;
    }

    .toast {
      position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.85); color: #fff; padding: 10px 20px;
      border-radius: 20px; font-size: 14px; z-index: 1000;
      display: none; text-align: center; max-width: 85%;
    }
    .toast.error { background: rgba(192,57,43,0.95); }
    .loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.7); z-index: 2000;
      display: flex; justify-content: center; align-items: center;
      font-weight: bold; font-size: 16px; color: #f39c12;
    }
    .hidden { display: none; }

    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 3000;
      display: none; justify-content: center; align-items: center; padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: #fff; border-radius: 16px; padding: 22px;
      width: 100%; max-width: 360px; box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
    .modal-title { font-size: 16px; font-weight: bold; margin-bottom: 12px; color: #333; }
    .modal-message { font-size: 14px; color: #555; margin-bottom: 16px; line-height: 1.6; white-space: pre-wrap; }
    .modal-input {
      width: 100%; box-sizing: border-box; font-size: 16px;
      padding: 12px; border: 1px solid #ccc; border-radius: 10px; margin-bottom: 16px;
    }
    .modal-input:focus { outline: 2px solid #f39c12; border-color: #f39c12; }
    .modal-buttons { display: flex; gap: 10px; }
    .modal-btn {
      flex: 1; padding: 12px; border-radius: 10px;
      font-size: 15px; font-weight: bold; border: none;
    }
    .modal-btn-cancel { background: #f0f3f4; color: #555; }
    .modal-btn-confirm { background: #f39c12; color: #fff; }

    /* 🆕 TM選択モーダル */
    .team-option {
      display: block;
      width: 100%;
      padding: 18px;
      margin-bottom: 10px;
      border: 2px solid #ddd;
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      text-align: left;
    }
    .team-option:active { transform: scale(0.98); }
    .team-option.transport { border-color: #2ecc71; }
    .team-option.transport:active { background: #f0fff5; }
    .team-option.rental { border-color: #3498db; }
    .team-option.rental:active { background: #ebf5fb; }
    .team-option.both { border-color: #9b59b6; }
    .team-option.both:active { background: #f5eef8; }
    .team-option-sub { font-size: 12px; color: #888; font-weight: normal; margin-top: 4px; }

    /* ===== ライブスキャナー ===== */
    #scannerOverlay {
      z-index: 4000;
      background: rgba(0,0,0,0.92);
      flex-direction: column;
    }
    .scanner-wrap { position: relative; width: 100%; max-width: 480px; }
    #scannerVideo { width: 100%; border-radius: 14px; background: #000; display: block; }
    .scanner-frame {
      position: absolute; top: 18%; left: 12%; width: 76%; height: 64%;
      border: 3px solid rgba(255,255,255,0.85); border-radius: 14px;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.35);
      pointer-events: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .scanner-frame.flash {
      border-color: #2ecc71;
      box-shadow: 0 0 0 2000px rgba(46,204,113,0.15);
    }
    .scanner-frame.flash-error {
      border-color: #e74c3c;
      box-shadow: 0 0 0 2000px rgba(231,76,60,0.15);
    }
    .scanner-status {
      color: #fff; text-align: center; font-size: 13px; margin-top: 14px; min-height: 18px;
    }
    .scanner-mode-toggle {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      color: #fff; font-size: 13px; margin-top: 10px;
      padding: 8px 14px; background: rgba(255,255,255,0.12);
      border-radius: 24px; max-width: 480px; width: 100%;
    }
    .scanner-mode-toggle label {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
    }
    .scanner-mode-toggle input[type="checkbox"] {
      width: 18px; height: 18px; accent-color: #f39c12;
    }
    .scanner-close-btn {
      margin-top: 14px; width: 100%; max-width: 480px; padding: 14px;
      border-radius: 10px; font-size: 15px; font-weight: bold; border: none;
      background: #fff; color: #333;
    }
  </style>
</head>
<body>

  <div id="loading" class="loading-overlay">⏳ データを取得中...</div>
  <div id="toast" class="toast"></div>

  <!-- 🆕 TM選択モーダル(初回起動時 + ヘッダータップで切り替え) -->
  <div id="teamSelectModal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title">👥 担当チームを選択</div>
      <div class="modal-message">あなたが担当しているチームを選んでください。</div>
      <button class="team-option transport" onclick="selectTeam('運送')">
        🚛 運送TM
        <div class="team-option-sub">大会倉庫・その他の拠点担当</div>
      </button>
      <button class="team-option rental" onclick="selectTeam('レンタル')">
        🏢 レンタルTM
        <div class="team-option-sub">コンベンションセンター担当</div>
      </button>
      <button class="team-option both" onclick="selectTeam('両方')">
        🌐 両方表示
        <div class="team-option-sub">両チームの物品をすべて表示・スキャン可能</div>
      </button>
    </div>
  </div>

  <!-- ライブカメラスキャナー -->
  <div id="scannerOverlay" class="modal-overlay">
    <div class="scanner-wrap">
      <video id="scannerVideo" autoplay muted playsinline></video>
      <div id="scannerFrame" class="scanner-frame"></div>
    </div>
    <div class="scanner-status" id="scannerStatus">QRコードを枠の中に入れてください(自動で読み取ります)</div>
    <div class="scanner-mode-toggle">
      <label>
        <input type="checkbox" id="autoCloseToggle" onchange="onAutoCloseToggleChange()">
        <span>1つスキャンしたら自動で閉じる(レジゴー方式)</span>
      </label>
    </div>
    <button class="scanner-close-btn" onclick="closeScanner()">閉じる</button>
    <canvas id="scannerCanvas" class="hidden"></canvas>
  </div>

  <div id="inputModal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title">🔢 コード手動入力</div>
      <div class="modal-message">物品の識別コードを入力してください</div>
      <input type="text" id="manualCodeInput" class="modal-input" placeholder="例: 〇〇-NFH2-150S" autocomplete="off" autocapitalize="characters">
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-cancel" onclick="closeInputModal()">キャンセル</button>
        <button class="modal-btn modal-btn-confirm" onclick="submitManualCode()">登録</button>
      </div>
    </div>
  </div>

  <div id="messageModal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title" id="messageModalTitle">お知らせ</div>
      <div class="modal-message" id="messageModalBody"></div>
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-confirm" style="flex:1" onclick="closeMessageModal()">OK</button>
      </div>
    </div>
  </div>

  <!-- 🆕 ヘッダー: 担当TMバッジ表示。タップでチーム切り替え -->
  <div class="header-panel" onclick="openTeamSelectModal()" style="cursor:pointer;">
    <div class="header-left">
      <div class="header-title">📦 CO-30 現場検品</div>
      <div id="teamBadge" class="header-team">タップしてチーム選択</div>
    </div>
    <div class="header-counter">
      <span>検品済</span>
      <div id="totalQty" class="counter-badge">0</div>
    </div>
  </div>

  <div id="locationBar" class="location-bar">拠点: 未選択</div>

  <div class="item-list-container" id="itemList"></div>

  <!-- 🆕 下部固定スキャンボタン(レジゴー風) -->
  <div class="scan-dock">
    <button class="btn-scan-bottom" onclick="openScanner()">
      <span class="icon">📷</span>
      <span>カメラでスキャン</span>
    </button>
    <button class="btn-manual-mini" onclick="openInputModal()">🔢 コード手動入力</button>
  </div>

  <script>
    /* =========================================================
       設定: Apps Script Webアプリの /exec URL
       ========================================================= */
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwobEQpkj-xUti3WC0mBoH0ylD4U_Zf1hjv4UHoXxjxQP8PO1nqOkQXg1I7Iefihcc/exec";

    // URLパラメータから拠点名・チームを取得
    const urlParams = new URLSearchParams(window.location.search);
    let activeLocation = urlParams.get('loc') || "";
    let activeTeam = ""; // "運送" | "レンタル" | "両方"

    let inspectionItems = [];
    let groupMap = {};
    let groupOrder = [];
    let latestCode = null;

    let lastScannedCode = null;
    let lastScannedAt = 0;
    const SCAN_COOLDOWN_MS = 1200;

    const syncingCodes = new Set();

    window.onload = function() {
      if (activeLocation) {
        document.getElementById("locationBar").innerText = `拠点: ${activeLocation}`;
      } else {
        document.getElementById("locationBar").innerText = `拠点: すべて`;
      }
      // 前回のTM選択を復元(なければ初回モーダル表示)
      const savedTeam = localStorage.getItem('scanner_active_team');
      if (savedTeam) {
        activeTeam = savedTeam;
        updateTeamBadge();
        loadRealData();
      } else {
        openTeamSelectModal();
      }
    };

    /* =========================================================
       TM選択
       ========================================================= */
    function openTeamSelectModal() {
      document.getElementById('teamSelectModal').classList.add('show');
    }
    function selectTeam(team) {
      activeTeam = team;
      localStorage.setItem('scanner_active_team', team);
      document.getElementById('teamSelectModal').classList.remove('show');
      updateTeamBadge();
      loadRealData();
    }
    function updateTeamBadge() {
      const badge = document.getElementById('teamBadge');
      badge.classList.remove('transport', 'rental', 'both');
      if (activeTeam === '運送') {
        badge.innerText = '🚛 運送TM';
        badge.classList.add('transport');
      } else if (activeTeam === 'レンタル') {
        badge.innerText = '🏢 レンタルTM';
        badge.classList.add('rental');
      } else if (activeTeam === '両方') {
        badge.innerText = '🌐 両方表示';
        badge.classList.add('both');
      }
    }

    /* =========================================================
       Apps Script との通信
       ========================================================= */
    async function gasGet(action, params = {}) {
      const u = new URL(GAS_API_URL);
      u.searchParams.set('action', action);
      Object.keys(params).forEach(k => u.searchParams.set(k, params[k]));
      const res = await fetch(u.toString(), { method: 'GET' });
      if (!res.ok) throw new Error("HTTP " + res.status);
      return await res.json();
    }

    async function gasPost(action, body = {}) {
      const res = await fetch(GAS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: action, payload: body })
      });
      if (!res.ok) throw new Error("HTTP " + res.status);
      return await res.json();
    }

    async function loadRealData() {
      document.getElementById("loading").style.display = "flex";
      try {
        const data = await gasGet('getInspectionData', {
          location: activeLocation,
          team: activeTeam
        });
        inspectionItems = data || [];
        buildGroups();
        groupOrder = Object.keys(groupMap).sort((codeA, codeB) => {
          const latestA = Math.max(...groupMap[codeA].indices.map(idx => inspectionItems[idx].updatedAt || 0));
          const latestB = Math.max(...groupMap[codeB].indices.map(idx => inspectionItems[idx].updatedAt || 0));
          return latestB - latestA;
        });
        renderList();
      } catch (err) {
        showMessageModal("データ取得エラー", err.message);
      } finally {
        document.getElementById("loading").style.display = "none";
      }
    }

    function buildGroups() {
      groupMap = {};
      inspectionItems.forEach((item, idx) => {
        if (!groupMap[item.code]) {
          groupMap[item.code] = { indices: [], name: item.name, team: item.team };
        }
        groupMap[item.code].indices.push(idx);
      });
    }

    function getGroupTotals(code) {
      const indices = groupMap[code].indices;
      let planTotal = 0, actualTotal = 0;
      indices.forEach(idx => {
        planTotal += inspectionItems[idx].plan;
        actualTotal += inspectionItems[idx].actual;
      });
      return { planTotal, actualTotal };
    }

    function bringGroupToFront(code) {
      groupOrder = groupOrder.filter(c => c !== code);
      groupOrder.unshift(code);
    }
    function removeGroupFromOrder(code) {
      groupOrder = groupOrder.filter(c => c !== code);
    }

    function renderList() {
      const listContainer = document.getElementById("itemList");
      const totalActual = inspectionItems.reduce((sum, it) => sum + it.actual, 0);
      document.getElementById("totalQty").innerText = totalActual;

      listContainer.innerHTML = "";

      if (inspectionItems.length === 0) {
        listContainer.innerHTML = '<p class="empty-hint">このチームの検品対象データがありません。<br>先にCO-30一括生成を行ってください。</p>';
        return;
      }

      const visibleCodes = groupOrder.filter(code => {
        const { actualTotal } = getGroupTotals(code);
        return actualTotal > 0;
      });

      if (visibleCodes.length === 0) {
        listContainer.innerHTML = '<p class="empty-hint">📷 QRコードをスキャンすると、<br>ここに検品済みの商品が表示されます。</p>';
        return;
      }

      visibleCodes.forEach(code => {
        const group = groupMap[code];
        const { planTotal, actualTotal } = getGroupTotals(code);
        const isDone = actualTotal >= planTotal;
        const isSyncing = syncingCodes.has(code);
        const isLatest = code === latestCode;

        const card = document.createElement("div");
        card.className = `item-card ${isDone ? 'completed' : ''} ${isSyncing ? 'syncing' : ''} ${isLatest ? 'latest' : ''}`;
        card.innerHTML = `
          <div class="item-info">
            <div class="item-name">${escapeHtml(group.name)}</div>
            <div class="item-code">コード: ${escapeHtml(code)}</div>
            <div class="item-status-text ${isDone ? 'status-ok' : 'status-wait'}">
              ${isDone ? '✓ 検品完了' : `残り ${planTotal - actualTotal} 点`}
            </div>
          </div>
          <div class="qty-controls">
            <button class="btn-qty" ${isSyncing ? 'disabled' : ''} onclick="changeQtyGroup('${escapeJs(code)}', -1)">-</button>
            <div class="qty-display">${actualTotal} / ${planTotal}</div>
            <button class="btn-qty" ${isSyncing ? 'disabled' : ''} onclick="changeQtyGroup('${escapeJs(code)}', 1)">+</button>
          </div>
        `;
        listContainer.appendChild(card);
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function escapeJs(s) {
      return String(s).replace(/['\\]/g, '\\$&');
    }

    async function changeQtyGroup(code, amount) {
      if (syncingCodes.has(code)) return;
      const group = groupMap[code];
      if (!group) return;

      let targetIndex = null;
      if (amount > 0) {
        targetIndex = group.indices.find(idx => inspectionItems[idx].actual < inspectionItems[idx].plan);
        if (targetIndex === undefined) {
          showToast(`⚠️ ${group.name} は既に必要数に達しています`);
          return;
        }
      } else {
        for (let i = group.indices.length - 1; i >= 0; i--) {
          if (inspectionItems[group.indices[i]].actual > 0) {
            targetIndex = group.indices[i];
            break;
          }
        }
        if (targetIndex === null) return;
      }

      const item = inspectionItems[targetIndex];
      const nextQty = item.actual + amount;
      if (nextQty < 0 || nextQty > item.plan) return;

      const previousQty = item.actual;
      item.actual = nextQty;

      const { actualTotal: newActualTotal } = getGroupTotals(code);
      if (newActualTotal > 0) {
        bringGroupToFront(code);
        latestCode = code;
      } else {
        removeGroupFromOrder(code);
        latestCode = null;
      }

      syncingCodes.add(code);
      renderList();

      try {
        const res = await gasPost('updateInspectionQty', {
          location: activeLocation,
          itemCode: item.code,
          newQty: nextQty,
          rowId: item.rowId
        });
        syncingCodes.delete(code);
        if (!res || !res.success) {
          item.actual = previousQty;
          const { actualTotal: rollbackTotal } = getGroupTotals(code);
          if (rollbackTotal === 0) removeGroupFromOrder(code);
          showToast("⚠️ シートの同期に失敗したため元に戻しました: " + (res && res.error ? res.error : ""));
        } else {
          if (res.updatedAt) item.updatedAt = res.updatedAt;
          if (res.rowId) item.rowId = res.rowId;
        }
        renderList();
      } catch (err) {
        syncingCodes.delete(code);
        item.actual = previousQty;
        const { actualTotal: rollbackTotal } = getGroupTotals(code);
        if (rollbackTotal === 0) removeGroupFromOrder(code);
        showToast("⚠️ 通信エラーのため元に戻しました: " + err.message);
        renderList();
      }
    }

    function onScanSuccess(decodedText) {
      const cleanCode = (decodedText || "").trim();
      if (!cleanCode) return;

      const now = Date.now();
      if (cleanCode === lastScannedCode && (now - lastScannedAt) < SCAN_COOLDOWN_MS) {
        return;
      }
      lastScannedCode = cleanCode;
      lastScannedAt = now;

      if (groupMap[cleanCode]) {
        const group = groupMap[cleanCode];
        // 🆕 担当外チェック(両方モード時は常にOK)
        if (activeTeam !== '両方' && group.team && group.team !== activeTeam) {
          showToast(`❌ 担当外: ${group.team}TMの物品です(${group.name})`, true);
          playErrorBeep();
          flashScannerFrame(true);
          return;
        }

        const totalsBefore = getGroupTotals(cleanCode);
        if (totalsBefore.actualTotal < totalsBefore.planTotal) {
          changeQtyGroup(cleanCode, 1);
          showToast(`🟢 ピッ！ ${group.name}`);
          playBeep();
          if (navigator.vibrate) navigator.vibrate(50);
        } else {
          showToast(`⚠️ ${group.name} は既に必要数に達しています`);
        }
      } else {
        showToast(`❌ 未登録コード: ${cleanCode}`, true);
      }
    }

    /* =========================================================
       スキャナーモード設定
       ========================================================= */
    function getAutoCloseEnabled() {
      return localStorage.getItem('scanner_auto_close') !== 'no';
    }
    function setAutoCloseEnabled(val) {
      localStorage.setItem('scanner_auto_close', val ? 'yes' : 'no');
    }
    function onAutoCloseToggleChange() {
      const cb = document.getElementById('autoCloseToggle');
      setAutoCloseEnabled(cb.checked);
    }
    window.addEventListener('DOMContentLoaded', function() {
      const cb = document.getElementById('autoCloseToggle');
      if (cb) cb.checked = getAutoCloseEnabled();
    });

    /* =========================================================
       ライブカメラスキャナー
       ========================================================= */
    let scannerStream = null;
    let scannerRAF = null;

    function openScanner() {
      if (!activeTeam) {
        openTeamSelectModal();
        return;
      }
      ensureAudioContext();
      const overlay = document.getElementById("scannerOverlay");
      const video = document.getElementById("scannerVideo");
      const statusEl = document.getElementById("scannerStatus");

      overlay.classList.add("show");
      statusEl.innerText = "カメラを起動しています...";

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        overlay.classList.remove("show");
        showMessageModal("カメラが使用できません", "このブラウザはリアルタイムスキャンに対応していません。");
        return;
      }

      navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: "environment" },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      }).then(function(stream) {
        scannerStream = stream;
        video.srcObject = stream;
        video.onloadedmetadata = function() {
          video.play();
          statusEl.innerText = "QRコードを枠の中に入れてください(自動で読み取ります)";
          scanLoop();
        };
      }).catch(function(err) {
        closeScanner();
        showMessageModal(
          "カメラを起動できません",
          "カメラへのアクセスが許可されていない可能性があります。\n\n詳細: " + err.message
        );
      });
    }

    function scanLoop() {
      if (!scannerStream) return;
      const video = document.getElementById("scannerVideo");
      const canvas = document.getElementById("scannerCanvas");

      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        const vw = video.videoWidth, vh = video.videoHeight;
        if (vw && vh) {
          const targetWidths = [vw, 800, 480];
          let result = null;

          for (const targetW of targetWidths) {
            const scale = Math.min(1, targetW / vw);
            const cw = Math.round(vw * scale);
            const ch = Math.round(vh * scale);
            canvas.width = cw;
            canvas.height = ch;
            const ctx = canvas.getContext("2d", { willReadFrequently: true });
            ctx.drawImage(video, 0, 0, cw, ch);

            try {
              const imageData = ctx.getImageData(0, 0, cw, ch);
              result = jsQR(imageData.data, cw, ch, { inversionAttempts: "attemptBoth" });
              if (result && result.data) break;
            } catch (e) {}
          }

          if (result && result.data) {
            onScanSuccess(result.data);
            // 担当外エラーの場合はflashScannerFrame(true)が onScanSuccess 内で呼ばれる
            // 正常スキャン時のみここで通常フラッシュ + 自動クローズ判定
            const code = (result.data || "").trim();
            const group = groupMap[code];
            const isAllowed = group && (activeTeam === '両方' || !group.team || group.team === activeTeam);
            if (isAllowed) {
              flashScannerFrame();
              if (getAutoCloseEnabled()) {
                closeScanner();
              }
            }
          }
        }
      }

      scannerRAF = requestAnimationFrame(scanLoop);
    }

    function flashScannerFrame(isError) {
      const frame = document.getElementById("scannerFrame");
      const cls = isError ? 'flash-error' : 'flash';
      frame.classList.add(cls);
      setTimeout(() => frame.classList.remove(cls), 250);
    }

    function closeScanner() {
      if (scannerRAF) {
        cancelAnimationFrame(scannerRAF);
        scannerRAF = null;
      }
      if (scannerStream) {
        scannerStream.getTracks().forEach(t => t.stop());
        scannerStream = null;
      }
      const video = document.getElementById("scannerVideo");
      video.srcObject = null;
      document.getElementById("scannerOverlay").classList.remove("show");
    }

    /* =========================================================
       コード手動入力
       ========================================================= */
    function openInputModal() {
      const modal = document.getElementById("inputModal");
      const input = document.getElementById("manualCodeInput");
      input.value = "";
      modal.classList.add("show");
      setTimeout(() => input.focus(), 150);
    }
    function closeInputModal() {
      document.getElementById("inputModal").classList.remove("show");
    }
    function submitManualCode() {
      const input = document.getElementById("manualCodeInput");
      const code = input.value.trim();
      closeInputModal();
      if (code) onScanSuccess(code);
    }
    document.addEventListener("DOMContentLoaded", function() {
      const input = document.getElementById("manualCodeInput");
      if (input) {
        input.addEventListener("keydown", function(e) {
          if (e.key === "Enter") { e.preventDefault(); submitManualCode(); }
        });
      }
    });

    function showMessageModal(title, body) {
      document.getElementById("messageModalTitle").innerText = title;
      document.getElementById("messageModalBody").innerText = body;
      document.getElementById("messageModal").classList.add("show");
    }
    function closeMessageModal() {
      document.getElementById("messageModal").classList.remove("show");
    }

    /* =========================================================
       ビープ音(WebAudio)
       ========================================================= */
    let audioCtx = null;
    function ensureAudioContext() {
      if (audioCtx) return;
      try {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) audioCtx = new AC();
      } catch (e) {}
    }
    function playBeep() {
      if (!audioCtx) return;
      try {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.4, audioCtx.currentTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.16);
      } catch (e) {}
    }
    function playErrorBeep() {
      if (!audioCtx) return;
      try {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        // 低い「ブッブッ」音(エラー用)
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(220, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.3, audioCtx.currentTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.36);
      } catch (e) {}
    }

    function showToast(msg, isError) {
      const toast = document.getElementById("toast");
      toast.innerText = msg;
      toast.classList.toggle('error', !!isError);
      toast.style.display = "block";
      setTimeout(() => { toast.style.display = "none"; }, 2400);
    }
  </script>
</body>
</html>
