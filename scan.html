<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CO-30 現場検品スキャナー</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f4f6f7;
      margin: 0; padding: 0;
      color: #333;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== ヘッダー ===== */
    .header-panel {
      background-color: #f39c12;
      color: #fff;
      padding: 12px 15px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 3px 6px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-panel.mode-return { background-color: #8e44ad; }
    .header-left { display: flex; flex-direction: column; gap: 2px; }
    .header-title { font-size: 14px; font-weight: bold; }
    .header-team {
      font-size: 11px;
      background: rgba(255,255,255,0.25);
      padding: 2px 8px;
      border-radius: 10px;
      display: inline-block;
      width: fit-content;
    }
    .header-team.transport { background: #2ecc71; }
    .header-team.rental    { background: #3498db; }
    .header-team.both      { background: #9b59b6; }
    .header-counter { display: flex; align-items: center; gap: 8px; }
    .counter-badge {
      background: #fff;
      color: #f39c12;
      font-size: 22px;
      font-weight: bold;
      padding: 4px 14px;
      border-radius: 8px;
      min-width: 40px;
      text-align: center;
    }
    .header-panel.mode-return .counter-badge { color: #8e44ad; }

    /* ===== モード切り替えタブ ===== */
    .mode-tabs {
      display: flex;
      background: #fff;
      border-bottom: 2px solid #eee;
    }
    .mode-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-size: 14px;
      font-weight: bold;
      color: #aaa;
      border: none;
      background: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
    }
    .mode-tab.active-inspect {
      color: #f39c12;
      border-bottom-color: #f39c12;
    }
    .mode-tab.active-return {
      color: #8e44ad;
      border-bottom-color: #8e44ad;
    }

    .location-bar {
      background-color: #eeb95d;
      color: #fff;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: bold;
      text-align: center;
    }
    .location-bar.mode-return { background-color: #a569bd; }

    /* ===== モードバナー ===== */
    .mode-banner {
      display: none;
      background: #f5eef8;
      border-bottom: 1px solid #d7bde2;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: bold;
      color: #8e44ad;
      text-align: center;
    }
    .mode-banner.show { display: block; }

    /* ===== リスト ===== */
    .item-list-container { padding: 12px; padding-bottom: 180px; }
    .empty-hint {
      text-align: center; color: #aaa;
      padding: 40px 20px; font-size: 14px; line-height: 1.6;
    }
    .item-card {
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 6px solid #ccc;
      transition: opacity 0.15s;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .item-card.completed  { border-left-color: #2ecc71; background-color: #f0fff5; }
    .item-card.returned   { border-left-color: #8e44ad; background-color: #f5eef8; }
    .item-card.syncing    { opacity: 0.5; }
    .item-card.latest     { border-left-color: #f39c12; box-shadow: 0 2px 8px rgba(243,156,18,0.3); }
    .item-info { flex: 1; }
    .item-name { font-size: 16px; font-weight: bold; margin-bottom: 4px; }
    .item-code { font-size: 11px; color: #7f8c8d; }
    .item-team-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: bold;
      padding: 1px 6px;
      border-radius: 8px;
      margin-top: 4px;
      color: #fff;
    }
    .item-team-tag.transport { background: #2ecc71; }
    .item-team-tag.rental    { background: #3498db; }
    .item-status-text { font-size: 12px; font-weight: bold; margin-top: 4px; }
    .status-wait    { color: #e67e22; }
    .status-ok      { color: #2ecc71; }
    .status-returned { color: #8e44ad; }
    .qty-controls {
      display: flex; align-items: center; gap: 6px;
      background: #f0f3f4; padding: 5px 10px; border-radius: 24px;
    }
    .btn-qty {
      background: #fff; border: 1px solid #bdc3c7;
      width: 40px; height: 40px; border-radius: 50%;
      font-size: 18px; font-weight: bold;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-qty:disabled { opacity: 0.4; }
    .qty-display { font-size: 16px; font-weight: bold; min-width: 48px; text-align: center; }

    /* ===== 下部固定スキャンボタン ===== */
    .scan-dock {
      position: fixed;
      bottom: 0; left: 0; width: 100%;
      background: linear-gradient(to top, rgba(244,246,247,1) 0%, rgba(244,246,247,1) 60%, rgba(244,246,247,0) 100%);
      padding: 30px 14px 18px 14px;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 18px);
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }
    .btn-scan-bottom {
      background: #f39c12;
      color: #fff;
      border: none;
      font-size: 18px;
      font-weight: bold;
      padding: 22px 30px;
      border-radius: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 16px rgba(243,156,18,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .btn-scan-bottom.mode-return {
      background: #8e44ad;
      box-shadow: 0 4px 16px rgba(142,68,173,0.5);
    }
    .btn-scan-bottom:active { transform: scale(0.97); opacity: 0.9; }
    .btn-scan-bottom .icon { font-size: 24px; }
    .dock-mini-row { display: flex; gap: 10px; }
    .btn-manual-mini {
      background: rgba(0,0,0,0.06);
      color: #555;
      border: none;
      font-size: 12px;
      padding: 8px 16px;
      border-radius: 18px;
      font-weight: bold;
    }

    /* ===== トースト ===== */
    .toast {
      position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.85); color: #fff; padding: 10px 20px;
      border-radius: 20px; font-size: 14px; z-index: 5000;
      display: none; text-align: center; max-width: 85%;
    }
    .toast.error  { background: rgba(192,57,43,0.95); }
    .toast.return { background: rgba(142,68,173,0.95); }
    .loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.7); z-index: 2000;
      display: flex; justify-content: center; align-items: center;
      font-weight: bold; font-size: 16px; color: #f39c12;
    }
    .hidden { display: none; }

    /* ===== モーダル ===== */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 3000;
      display: none; justify-content: center; align-items: center; padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: #fff; border-radius: 16px; padding: 22px;
      width: 100%; max-width: 360px; box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
    .modal-title  { font-size: 16px; font-weight: bold; margin-bottom: 12px; color: #333; }
    .modal-message { font-size: 14px; color: #555; margin-bottom: 16px; line-height: 1.6; white-space: pre-wrap; }
    .modal-input {
      width: 100%; font-size: 16px; padding: 12px;
      border: 1px solid #ccc; border-radius: 10px; margin-bottom: 16px;
    }
    .modal-input:focus { outline: 2px solid #f39c12; }
    .modal-buttons { display: flex; gap: 10px; }
    .modal-btn { flex: 1; padding: 12px; border-radius: 10px; font-size: 15px; font-weight: bold; border: none; }
    .modal-btn-cancel  { background: #f0f3f4; color: #555; }
    .modal-btn-confirm { background: #f39c12; color: #fff; }

    /* TM選択 */
    .team-option {
      display: block; width: 100%; padding: 18px; margin-bottom: 10px;
      border: 2px solid #ddd; border-radius: 12px;
      background: #fff; cursor: pointer; font-size: 16px; font-weight: bold; text-align: left;
    }
    .team-option:active { transform: scale(0.98); }
    .team-option.transport { border-color: #2ecc71; }
    .team-option.rental    { border-color: #3498db; }
    .team-option.both      { border-color: #9b59b6; }
    .team-option-sub { font-size: 12px; color: #888; font-weight: normal; margin-top: 4px; }

    /* ===== 🆕 依頼一覧モーダル(部門・物品・数量・番号・検品状況のみのシンプル版) ===== */
    .request-list-box { max-width: 440px; max-height: 84vh; display: flex; flex-direction: column; }
    .request-list { overflow-y: auto; flex: 1; margin-bottom: 14px; -webkit-overflow-scrolling: touch; }
    .req-card { border: 1px solid #eee; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; background: #fafbfc; }
    .req-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
    .req-no { font-weight: bold; font-size: 14px; color: #333; }
    .req-no.unassigned { color: #aaa; font-weight: normal; }
    .req-dept { font-size: 13px; color: #555; }
    .req-progress { font-size: 11px; font-weight: bold; color: #1e8449; background: #eafaf1; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
    .req-progress.muted { color: #999; background: #f0f0f0; }
    .req-item-row { margin-top: 8px; padding-top: 8px; border-top: 1px dashed #e5e5e5; }
    .req-item-name { font-size: 13px; font-weight: bold; color: #333; margin-bottom: 4px; }
    .req-item-codes { display: flex; flex-wrap: wrap; gap: 6px; }
    .code-chip { font-size: 11px; font-family: "SF Mono", "Consolas", monospace; padding: 3px 8px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #555; }
    .code-chip.done { background: #eafaf1; border-color: #2ecc71; color: #1e8449; font-weight: bold; }
    .code-chip.muted { border-style: dashed; color: #999; font-family: inherit; }

    /* ===== スキャナー ===== */
    /* 🆕 閉じるボタンが下部に隠れないよう、余白+スクロール+ボタン位置を調整 */
    #scannerOverlay {
      z-index: 4000;
      background: rgba(0,0,0,0.92);
      flex-direction: column;
      justify-content: flex-start;
      padding: 14px;
      padding-top: calc(env(safe-area-inset-top, 0px) + 14px);
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
      overflow-y: auto;
    }
    .scanner-wrap { position: relative; width: 100%; max-width: 480px; margin: 0 auto; }
    #scannerVideo { width: 100%; max-height: 48vh; object-fit: cover; border-radius: 14px; background: #000; display: block; }
    .scanner-frame {
      position: absolute; top: 14%; left: 12%; width: 76%; height: 70%;
      border: 3px solid rgba(255,255,255,0.85); border-radius: 14px;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.35);
      pointer-events: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .scanner-frame.flash        { border-color: #2ecc71; box-shadow: 0 0 0 2000px rgba(46,204,113,0.15); }
    .scanner-frame.flash-return { border-color: #8e44ad; box-shadow: 0 0 0 2000px rgba(142,68,173,0.15); }
    .scanner-frame.flash-error  { border-color: #e74c3c; box-shadow: 0 0 0 2000px rgba(231,76,60,0.15); }
    .scanner-status {
      color: #fff; text-align: center; font-size: 13px; margin-top: 12px; min-height: 18px;
    }
    .scanner-mode-toggle {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      color: #fff; font-size: 13px; margin: 10px auto 0 auto;
      padding: 8px 14px; background: rgba(255,255,255,0.12);
      border-radius: 24px; max-width: 480px; width: 100%;
    }
    .scanner-mode-toggle label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .scanner-mode-toggle input[type="checkbox"] { width: 18px; height: 18px; accent-color: #f39c12; }
    .scanner-close-btn {
      margin: 14px auto 0 auto;
      margin-bottom: calc(env(safe-area-inset-bottom, 0px) + 40px);  /* 🆕 下部に隠れない余白 */
      display: block;
      width: 100%; max-width: 480px; padding: 16px;
      border-radius: 12px; font-size: 16px; font-weight: bold; border: none;
      background: #fff; color: #333;
      box-shadow: 0 4px 14px rgba(0,0,0,0.35);
    }
  </style>
</head>
<body>

  <div id="loading" class="loading-overlay">⏳ データを取得中...</div>
  <div id="toast" class="toast"></div>

  <!-- TM選択モーダル -->
  <div id="teamSelectModal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title">👥 担当チームを選択</div>
      <div class="modal-message">あなたが担当しているチームを選んでください。</div>
      <button class="team-option transport" onclick="selectTeam('運送')">
        🚛 運送TM
        <div class="team-option-sub">大会倉庫・その他の拠点担当</div>
      </button>
      <button class="team-option rental" onclick="selectTeam('レンタル')">
        🏢 レンタルTM
        <div class="team-option-sub">コンベンションセンター担当</div>
      </button>
      <button class="team-option both" onclick="selectTeam('両方')">
        🌐 両方表示
        <div class="team-option-sub">両チームの物品をすべて表示・スキャン可能</div>
      </button>
    </div>
  </div>

  <!-- スキャナー -->
  <div id="scannerOverlay" class="modal-overlay">
    <div class="scanner-wrap">
      <video id="scannerVideo" autoplay muted playsinline></video>
      <div id="scannerFrame" class="scanner-frame"></div>
    </div>
    <div class="scanner-status" id="scannerStatus">QRコードを枠の中に入れてください(自動で読み取ります)</div>
    <div class="scanner-mode-toggle">
      <label>
        <input type="checkbox" id="autoCloseToggle" onchange="onAutoCloseToggleChange()">
        <span>1つスキャンしたら自動で閉じる(レジゴー方式)</span>
      </label>
    </div>
    <button class="scanner-close-btn" onclick="closeScanner()">✕ 閉じる</button>
    <canvas id="scannerCanvas" class="hidden"></canvas>
  </div>

  <!-- 手動入力モーダル -->
  <div id="inputModal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title">🔢 コード手動入力</div>
      <div class="modal-message">物品の識別コードを入力してください</div>
      <input type="text" id="manualCodeInput" class="modal-input" placeholder="例: 3-2-1A" autocomplete="off" autocapitalize="characters">
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-cancel" onclick="closeInputModal()">キャンセル</button>
        <button class="modal-btn modal-btn-confirm" onclick="submitManualCode()">登録</button>
      </div>
    </div>
  </div>

  <!-- 🆕 依頼一覧モーダル -->
  <div id="requestListModal" class="modal-overlay">
    <div class="modal-box request-list-box">
      <div class="modal-title">📋 依頼一覧(ステータス付き)</div>
      <div class="request-list" id="requestListBody">⏳ 読み込み中...</div>
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-cancel" onclick="closeRequestList()">閉じる</button>
        <button class="modal-btn modal-btn-confirm" onclick="loadRequestList()">再読込</button>
      </div>
    </div>
  </div>

  <!-- メッセージモーダル -->
  <div id="messageModal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title" id="messageModalTitle">お知らせ</div>
      <div class="modal-message" id="messageModalBody"></div>
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-confirm" style="flex:1" onclick="closeMessageModal()">OK</button>
      </div>
    </div>
  </div>

  <!-- ヘッダー -->
  <div class="header-panel" id="headerPanel" onclick="openTeamSelectModal()" style="cursor:pointer;">
    <div class="header-left">
      <div class="header-title" id="headerTitle">📦 CO-30 現場検品</div>
      <div id="teamBadge" class="header-team">タップしてチーム選択</div>
    </div>
    <div class="header-counter">
      <span id="counterLabel">検品済</span>
      <div id="totalQty" class="counter-badge">0</div>
    </div>
  </div>

  <!-- モード切り替えタブ -->
  <div class="mode-tabs">
    <button class="mode-tab active-inspect" id="tab-inspect" onclick="switchMode('inspect')">
      📦 検品モード
    </button>
    <button class="mode-tab" id="tab-return" onclick="switchMode('return')">
      🔄 返却モード
    </button>
  </div>

  <!-- 返却モードバナー -->
  <div class="mode-banner" id="modeBanner">
    🔄 返却モード: QRをスキャンするとライフサイクルが「返却済」に更新されます
  </div>

  <div id="locationBar" class="location-bar">拠点: 未選択</div>

  <div class="item-list-container" id="itemList"></div>

  <!-- 下部固定スキャンボタン -->
  <div class="scan-dock">
    <button class="btn-scan-bottom" id="btnScan" onclick="openScanner()">
      <span class="icon">📷</span>
      <span id="scanBtnLabel">カメラでスキャン</span>
    </button>
    <div class="dock-mini-row">
      <button class="btn-manual-mini" onclick="openInputModal()">🔢 コード手動入力</button>
      <button class="btn-manual-mini" onclick="openRequestList()">📋 依頼一覧</button>
    </div>
  </div>

  <script>
    /* =========================================================
       設定
       ========================================================= */
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxNEE_cTr3b_M3yyra5Qd3BON-FXkhPv7Qp22IGrkEEwQq7S8j7p6eWUdalxA-V_eeT/exec";

    const urlParams = new URLSearchParams(window.location.search);
    let activeLocation = urlParams.get('loc') || "";
    let activeTeam = "";
    let currentMode = 'inspect'; // 'inspect' | 'return'

    let displayItems = [];
    let allItemsByCode = {};
    let groupMap = {};
    let groupOrder = [];
    let latestCode = null;

    let lastScannedCode = null;
    let lastScannedAt = 0;
    const SCAN_COOLDOWN_MS = 1200;
    const syncingCodes = new Set();

    /* =========================================================
       モード切り替え
       ========================================================= */
    function switchMode(mode) {
      currentMode = mode;
      const isReturn = (mode === 'return');

      document.getElementById('tab-inspect').className = 'mode-tab' + (isReturn ? '' : ' active-inspect');
      document.getElementById('tab-return').className  = 'mode-tab' + (isReturn ? ' active-return' : '');

      document.getElementById('headerPanel').classList.toggle('mode-return', isReturn);
      document.getElementById('locationBar').classList.toggle('mode-return', isReturn);
      document.getElementById('modeBanner').classList.toggle('show', isReturn);

      document.getElementById('btnScan').classList.toggle('mode-return', isReturn);
      document.getElementById('scanBtnLabel').textContent = isReturn ? '返却スキャン' : 'カメラでスキャン';

      document.getElementById('headerTitle').textContent = isReturn ? '🔄 CO-30 返却処理' : '📦 CO-30 現場検品';
      document.getElementById('counterLabel').textContent = isReturn ? '返却済' : '検品済';

      renderList();
    }

    /* =========================================================
       TM選択
       ========================================================= */
    window.onload = function() {
      document.getElementById("locationBar").innerText =
        activeLocation ? `拠点: ${activeLocation}` : `拠点: すべて`;

      const savedTeam = localStorage.getItem('scanner_active_team');
      if (savedTeam) {
        activeTeam = savedTeam;
        updateTeamBadge();
        loadRealData();
      } else {
        openTeamSelectModal();
      }
    };

    function openTeamSelectModal() {
      document.getElementById('teamSelectModal').classList.add('show');
    }
    function selectTeam(team) {
      activeTeam = team;
      localStorage.setItem('scanner_active_team', team);
      document.getElementById('teamSelectModal').classList.remove('show');
      updateTeamBadge();
      loadRealData();
    }
    function updateTeamBadge() {
      const badge = document.getElementById('teamBadge');
      badge.classList.remove('transport', 'rental', 'both');
      if (activeTeam === '運送') {
        badge.innerText = '🚛 運送TM'; badge.classList.add('transport');
      } else if (activeTeam === 'レンタル') {
        badge.innerText = '🏢 レンタルTM'; badge.classList.add('rental');
      } else {
        badge.innerText = '🌐 両方表示'; badge.classList.add('both');
      }
    }

    /* =========================================================
       データ取得
       ========================================================= */
    async function gasGet(action, params = {}) {
      const u = new URL(GAS_API_URL);
      u.searchParams.set('action', action);
      Object.keys(params).forEach(k => u.searchParams.set(k, params[k]));
      const res = await fetch(u.toString(), { method: 'GET' });
      if (!res.ok) throw new Error("HTTP " + res.status);
      return await res.json();
    }
    async function gasPost(action, body = {}) {
      const res = await fetch(GAS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: action, payload: body })
      });
      if (!res.ok) throw new Error("HTTP " + res.status);
      return await res.json();
    }

    async function loadRealData() {
      document.getElementById("loading").style.display = "flex";
      try {
        const res = await gasGet('getInspectionData', { location: activeLocation, team: activeTeam });
        displayItems = (res && res.display) ? res.display : [];
        const allItems = (res && res.all) ? res.all : [];
        allItemsByCode = {};
        allItems.forEach(item => {
          allItemsByCode[item.code] = { name: item.name, team: item.team, lifecycle: item.lifecycle };
        });
        buildGroups();
        groupOrder = Object.keys(groupMap).sort((a, b) => {
          const la = Math.max(...groupMap[a].indices.map(i => displayItems[i].updatedAt || 0));
          const lb = Math.max(...groupMap[b].indices.map(i => displayItems[i].updatedAt || 0));
          return lb - la;
        });
        renderList();
      } catch (err) {
        showMessageModal("データ取得エラー", err.message);
      } finally {
        document.getElementById("loading").style.display = "none";
      }
    }

    function buildGroups() {
      groupMap = {};
      displayItems.forEach((item, idx) => {
        if (!groupMap[item.code]) {
          groupMap[item.code] = { indices: [], name: item.name, team: item.team };
        }
        groupMap[item.code].indices.push(idx);
      });
    }

    function getGroupTotals(code) {
      let planTotal = 0, actualTotal = 0;
      groupMap[code].indices.forEach(idx => {
        planTotal  += displayItems[idx].plan;
        actualTotal += displayItems[idx].actual;
      });
      return { planTotal, actualTotal };
    }

    function bringGroupToFront(code) {
      groupOrder = groupOrder.filter(c => c !== code);
      groupOrder.unshift(code);
    }
    function removeGroupFromOrder(code) {
      groupOrder = groupOrder.filter(c => c !== code);
    }

    /* =========================================================
       リスト描画
       ========================================================= */
    function renderList() {
      const listContainer = document.getElementById("itemList");
      const totalActual = displayItems.reduce((sum, it) => sum + it.actual, 0);
      document.getElementById("totalQty").innerText = totalActual;

      listContainer.innerHTML = "";

      if (displayItems.length === 0) {
        listContainer.innerHTML = '<p class="empty-hint">このチームの検品対象データがありません。</p>';
        return;
      }

      const visibleCodes = groupOrder.filter(code => {
        const { actualTotal } = getGroupTotals(code);
        return actualTotal > 0;
      });

      if (visibleCodes.length === 0) {
        const msg = currentMode === 'return'
          ? '📷 QRコードをスキャンすると返却処理が記録されます。'
          : '📷 QRコードをスキャンすると、ここに検品済みの商品が表示されます。';
        listContainer.innerHTML = `<p class="empty-hint">${msg}</p>`;
        return;
      }

      visibleCodes.forEach(code => {
        const group = groupMap[code];
        const { planTotal, actualTotal } = getGroupTotals(code);
        const masterInfo = allItemsByCode[code] || {};
        const lifecycle  = masterInfo.lifecycle || '';
        const isReturned = lifecycle === '返却済';
        const isDone     = actualTotal >= planTotal;
        const isSyncing  = syncingCodes.has(code);
        const isLatest   = code === latestCode;
        const tagCls = group.team === '運送' ? 'transport' : group.team === 'レンタル' ? 'rental' : '';

        const card = document.createElement("div");
        card.className = `item-card
          ${isDone     ? 'completed' : ''}
          ${isReturned ? 'returned'  : ''}
          ${isSyncing  ? 'syncing'   : ''}
          ${isLatest   ? 'latest'    : ''}`.replace(/\s+/g, ' ').trim();

        let statusHtml = '';
        if (isReturned) {
          statusHtml = '<div class="item-status-text status-returned">✅ 返却済</div>';
        } else if (isDone) {
          statusHtml = '<div class="item-status-text status-ok">✓ 検品完了</div>';
        } else {
          statusHtml = `<div class="item-status-text status-wait">残り ${planTotal - actualTotal} 点</div>`;
        }

        card.innerHTML = `
          <div class="item-info">
            <div class="item-name">${escapeHtml(group.name)}</div>
            <div class="item-code">コード: ${escapeHtml(code)}</div>
            ${activeTeam === '両方' && tagCls ? `<span class="item-team-tag ${tagCls}">${escapeHtml(group.team)}TM</span>` : ''}
            ${statusHtml}
          </div>
          <div class="qty-controls">
            <button class="btn-qty" ${isSyncing ? 'disabled' : ''} onclick="changeQtyGroup('${escapeJs(code)}', -1)">-</button>
            <div class="qty-display">${actualTotal} / ${planTotal}</div>
            <button class="btn-qty" ${isSyncing ? 'disabled' : ''} onclick="changeQtyGroup('${escapeJs(code)}', 1)">+</button>
          </div>`;
        listContainer.appendChild(card);
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function escapeJs(s) { return String(s).replace(/['\\]/g, '\\$&'); }

    /* =========================================================
       🆕 依頼一覧(ステータス付き)
       ========================================================= */
    function openRequestList() {
      document.getElementById('requestListModal').classList.add('show');
      loadRequestList();
    }
    function closeRequestList() {
      document.getElementById('requestListModal').classList.remove('show');
    }
    /* 🆕 部門・物品名・数量・物品ごとの番号・検品済かどうかだけを表示する */
    async function loadRequestList() {
      const body = document.getElementById('requestListBody');
      body.innerHTML = '⏳ 読み込み中...';
      try {
        const res = await gasGet('listRequests');
        const reqs = (res && res.requests) ? res.requests : [];
        if (!reqs.length) {
          body.innerHTML = '<p class="empty-hint">依頼データがありません</p>';
          return;
        }
        body.innerHTML = '';
        reqs.forEach(r => {
          let totalCodes = 0, doneCodes = 0;
          (r.items || []).forEach(it => {
            (it.codes || []).forEach(c => { totalCodes++; if (c.checked) doneCodes++; });
          });
          const progressHtml = totalCodes > 0
            ? `<span class="req-progress">${doneCodes}/${totalCodes} 検品済</span>`
            : `<span class="req-progress muted">CO30未作成</span>`;

          const itemsHtml = (r.items || []).map(it => {
            let codesHtml;
            if (it.codes && it.codes.length > 0) {
              codesHtml = it.codes.map(c =>
                `<span class="code-chip ${c.checked ? 'done' : ''}">${escapeHtml(c.code)}${c.checked ? ' ✓' : ''}</span>`
              ).join('');
            } else {
              codesHtml = `<span class="code-chip muted">(CO30未作成)</span>`;
            }
            return `<div class="req-item-row">
                <div class="req-item-name">${escapeHtml(it.name)} × ${escapeHtml(it.qty)}</div>
                <div class="req-item-codes">${codesHtml}</div>
              </div>`;
          }).join('');

          const div = document.createElement('div');
          div.className = 'req-card';
          div.innerHTML = `
            <div class="req-top">
              <span class="req-no ${r.reqNo ? '' : 'unassigned'}">${escapeHtml(r.reqNo || '未採番')}</span>
              <span class="req-dept">${escapeHtml(r.dept)}</span>
              ${progressHtml}
            </div>
            ${itemsHtml || '<div class="req-item-row" style="color:#999;">(物品なし)</div>'}`;
          body.appendChild(div);
        });
      } catch (err) {
        body.innerHTML = '❌ 取得エラー: ' + escapeHtml(err.message);
      }
    }

    /* =========================================================
       検品数量変更
       ========================================================= */
    async function changeQtyGroup(code, amount) {
      if (syncingCodes.has(code)) return;
      const group = groupMap[code];
      if (!group) return;

      let targetIndex = null;
      if (amount > 0) {
        targetIndex = group.indices.find(idx => displayItems[idx].actual < displayItems[idx].plan);
        if (targetIndex === undefined) { showToast(`⚠️ ${group.name} は既に必要数に達しています`); return; }
      } else {
        for (let i = group.indices.length - 1; i >= 0; i--) {
          if (displayItems[group.indices[i]].actual > 0) { targetIndex = group.indices[i]; break; }
        }
        if (targetIndex === null) return;
      }

      const item = displayItems[targetIndex];
      const nextQty = item.actual + amount;
      if (nextQty < 0 || nextQty > item.plan) return;

      const previousQty = item.actual;
      item.actual = nextQty;
      const { actualTotal: newActualTotal } = getGroupTotals(code);
      if (newActualTotal > 0) { bringGroupToFront(code); latestCode = code; }
      else { removeGroupFromOrder(code); latestCode = null; }

      syncingCodes.add(code);
      renderList();

      try {
        const res = await gasPost('updateInspectionQty', {
          location: activeLocation, itemCode: item.code,
          newQty: nextQty, rowId: item.rowId
        });
        syncingCodes.delete(code);
        if (!res || !res.success) {
          item.actual = previousQty;
          const { actualTotal: rollbackTotal } = getGroupTotals(code);
          if (rollbackTotal === 0) removeGroupFromOrder(code);
          showToast("⚠️ 同期失敗: " + (res && res.error ? res.error : ""), true);
        } else {
          if (res.updatedAt) item.updatedAt = res.updatedAt;
          if (res.rowId) item.rowId = res.rowId;
        }
      } catch (err) {
        syncingCodes.delete(code);
        item.actual = previousQty;
        showToast("⚠️ 通信エラー: " + err.message, true);
      }
      renderList();
    }

    /* =========================================================
       スキャン成功時の共通処理
       ========================================================= */
    function onScanSuccess(decodedText) {
      const cleanCode = (decodedText || "").trim();
      if (!cleanCode) return;

      const now = Date.now();
      if (cleanCode === lastScannedCode && (now - lastScannedAt) < SCAN_COOLDOWN_MS) return;
      lastScannedCode = cleanCode;
      lastScannedAt = now;

      const masterInfo = allItemsByCode[cleanCode];

      if (!masterInfo) {
        showToast(`❌ 未登録コード: ${cleanCode}`, 'error');
        playErrorBeep();
        flashScannerFrame('error');
        return;
      }

      if (activeTeam !== '両方' && masterInfo.team && masterInfo.team !== activeTeam) {
        showToast(`❌ 担当外: ${masterInfo.team}TMの物品です(${masterInfo.name})`, 'error');
        playErrorBeep();
        flashScannerFrame('error');
        return;
      }

      if (currentMode === 'return') {
        handleReturnScan(cleanCode, masterInfo);
      } else {
        handleInspectScan(cleanCode, masterInfo);
      }
    }

    function handleInspectScan(code, masterInfo) {
      const group = groupMap[code];
      if (!group) { showToast(`❌ 表示データに見つかりません: ${code}`, 'error'); return; }

      const totalsBefore = getGroupTotals(code);
      if (totalsBefore.actualTotal < totalsBefore.planTotal) {
        changeQtyGroup(code, 1);
        showToast(`🟢 ピッ! ${masterInfo.name}`);
        playBeep();
        flashScannerFrame('ok');
        if (navigator.vibrate) navigator.vibrate(50);
        if (getAutoCloseEnabled()) closeScanner();
      } else {
        showToast(`⚠️ ${masterInfo.name} は既に必要数に達しています`);
        flashScannerFrame('ok');
      }
    }

    async function handleReturnScan(code, masterInfo) {
      if (masterInfo.lifecycle === '返却済') {
        showToast(`⚠️ ${masterInfo.name} はすでに返却済みです`, 'error');
        flashScannerFrame('error');
        return;
      }

      showToast(`🔄 返却処理中: ${masterInfo.name}`, 'return');
      playReturnBeep();
      flashScannerFrame('return');
      if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
      if (getAutoCloseEnabled()) closeScanner();

      try {
        const res = await gasPost('updateLifecycle', {
          itemCode: code,
          lifecycle: '返却済'
        });
        if (res && res.success) {
          if (allItemsByCode[code]) allItemsByCode[code].lifecycle = '返却済';
          showToast(`✅ 返却済に更新: ${masterInfo.name}`, 'return');
          renderList();
        } else {
          showToast(`❌ 更新失敗: ${res && res.error ? res.error : '不明なエラー'}`, 'error');
        }
      } catch (err) {
        showToast(`❌ 通信エラー: ${err.message}`, 'error');
      }
    }

    /* =========================================================
       スキャナーモード設定
       ========================================================= */
    function getAutoCloseEnabled() {
      return localStorage.getItem('scanner_auto_close') !== 'no';
    }
    function setAutoCloseEnabled(val) {
      localStorage.setItem('scanner_auto_close', val ? 'yes' : 'no');
    }
    function onAutoCloseToggleChange() {
      setAutoCloseEnabled(document.getElementById('autoCloseToggle').checked);
    }
    window.addEventListener('DOMContentLoaded', function() {
      const cb = document.getElementById('autoCloseToggle');
      if (cb) cb.checked = getAutoCloseEnabled();
    });

    /* =========================================================
       ライブカメラスキャナー
       ========================================================= */
    let scannerStream = null;
    let scannerRAF   = null;

    function openScanner() {
      if (!activeTeam) { openTeamSelectModal(); return; }
      ensureAudioContext();

      const overlay  = document.getElementById("scannerOverlay");
      const video    = document.getElementById("scannerVideo");
      const statusEl = document.getElementById("scannerStatus");
      overlay.classList.add("show");
      statusEl.innerText = "カメラを起動しています...";

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        overlay.classList.remove("show");
        showMessageModal("カメラが使用できません", "このブラウザはリアルタイムスキャンに対応していません。");
        return;
      }

      navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      }).then(function(stream) {
        scannerStream = stream;
        video.srcObject = stream;
        video.onloadedmetadata = function() {
          video.play();
          const modeLabel = currentMode === 'return' ? '返却するQRコードを枠に入れてください' : 'QRコードを枠の中に入れてください(自動で読み取ります)';
          statusEl.innerText = modeLabel;
          scanLoop();
        };
      }).catch(function(err) {
        closeScanner();
        showMessageModal("カメラを起動できません", "カメラへのアクセスが許可されていない可能性があります。\n\n詳細: " + err.message);
      });
    }

    function scanLoop() {
      if (!scannerStream) return;
      const video  = document.getElementById("scannerVideo");
      const canvas = document.getElementById("scannerCanvas");

      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        const vw = video.videoWidth, vh = video.videoHeight;
        if (vw && vh) {
          let result = null;
          for (const targetW of [vw, 800, 480]) {
            const scale = Math.min(1, targetW / vw);
            const cw = Math.round(vw * scale), ch = Math.round(vh * scale);
            canvas.width = cw; canvas.height = ch;
            const ctx = canvas.getContext("2d", { willReadFrequently: true });
            ctx.drawImage(video, 0, 0, cw, ch);
            try {
              const imageData = ctx.getImageData(0, 0, cw, ch);
              result = jsQR(imageData.data, cw, ch, { inversionAttempts: "attemptBoth" });
              if (result && result.data) break;
            } catch (e) {}
          }
          if (result && result.data) onScanSuccess(result.data);
        }
      }
      scannerRAF = requestAnimationFrame(scanLoop);
    }

    function flashScannerFrame(type) {
      const frame = document.getElementById("scannerFrame");
      frame.classList.remove('flash', 'flash-return', 'flash-error');
      const cls = type === 'ok' ? 'flash' : type === 'return' ? 'flash-return' : 'flash-error';
      frame.classList.add(cls);
      setTimeout(() => frame.classList.remove(cls), 250);
    }

    function closeScanner() {
      if (scannerRAF) { cancelAnimationFrame(scannerRAF); scannerRAF = null; }
      if (scannerStream) { scannerStream.getTracks().forEach(t => t.stop()); scannerStream = null; }
      document.getElementById("scannerVideo").srcObject = null;
      document.getElementById("scannerOverlay").classList.remove("show");
    }

    /* =========================================================
       手動入力
       ========================================================= */
    function openInputModal() {
      document.getElementById("manualCodeInput").value = "";
      document.getElementById("inputModal").classList.add("show");
      setTimeout(() => document.getElementById("manualCodeInput").focus(), 150);
    }
    function closeInputModal() { document.getElementById("inputModal").classList.remove("show"); }
    function submitManualCode() {
      const code = document.getElementById("manualCodeInput").value.trim();
      closeInputModal();
      if (code) onScanSuccess(code);
    }
    document.addEventListener("DOMContentLoaded", function() {
      const input = document.getElementById("manualCodeInput");
      if (input) input.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); submitManualCode(); } });
    });

    function showMessageModal(title, body) {
      document.getElementById("messageModalTitle").innerText = title;
      document.getElementById("messageModalBody").innerText = body;
      document.getElementById("messageModal").classList.add("show");
    }
    function closeMessageModal() { document.getElementById("messageModal").classList.remove("show"); }

    /* =========================================================
       ビープ音
       ========================================================= */
    let audioCtx = null;
    function ensureAudioContext() {
      if (audioCtx) return;
      try { const AC = window.AudioContext || window.webkitAudioContext; if (AC) audioCtx = new AC(); } catch (e) {}
    }
    function _playTone(freq, type, duration) {
      if (!audioCtx) return;
      try {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.4, audioCtx.currentTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + duration + 0.01);
      } catch (e) {}
    }
    function playBeep()      { _playTone(880, 'sine',   0.15); }
    function playReturnBeep(){ _playTone(660, 'sine',   0.25); _playTone(880, 'sine', 0.15); }
    function playErrorBeep() { _playTone(220, 'square', 0.35); }

    function showToast(msg, type) {
      const toast = document.getElementById("toast");
      toast.innerText = msg;
      toast.className = 'toast' + (type ? ' ' + type : '');
      toast.style.display = "block";
      setTimeout(() => { toast.style.display = "none"; }, 2400);
    }
  </script>
