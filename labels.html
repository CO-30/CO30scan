<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CO-30 QRラベル印刷</title>
  <!-- QRコード生成ライブラリ -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    /* ===== 画面表示用 ===== */
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f7;
      margin: 0;
      padding: 0;
      color: #333;
    }

    .screen-only {
      /* 印刷時は非表示 */
    }

    /* ヘッダー */
    .header {
      background: #2c5f8a;
      color: #fff;
      padding: 14px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .header h1 { margin: 0; font-size: 16px; font-weight: bold; }
    .header .sub { font-size: 12px; opacity: 0.8; margin-top: 2px; }

    /* フィルターバー */
    .filter-bar {
      background: #fff;
      padding: 12px 20px;
      border-bottom: 1px solid #dde3e9;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-bar select,
    .filter-bar input[type="text"] {
      font: inherit;
      font-size: 13px;
      border: 1px solid #dde3e9;
      border-radius: 8px;
      padding: 6px 10px;
      background: #fff;
    }
    .filter-bar input[type="text"] { min-width: 180px; }
    .filter-count {
      font-size: 12px;
      color: #888;
      margin-left: auto;
    }
    .btn-print {
      background: #2c5f8a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-print:hover { background: #1d4566; }

    /* ローディング */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #f39c12;
      font-size: 16px;
      font-weight: bold;
    }

    /* ===== 画面上のラベルプレビューエリア ===== */
    .preview-area {
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    /* ===== A4印刷レイアウト ===== */
    /* 1ラベルのサイズ: 約47mm x 47mm (A4に4列x5行=20枚) */
    @media screen {
      .label-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }
      .label-item {
        background: #fff;
        border: 1px dashed #bbb;
        border-radius: 6px;
        padding: 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        min-height: 90px;
      }
    }

    @media print {
      @page {
        size: A4;
        margin: 8mm;
      }
      body {
        background: #fff;
        margin: 0;
        padding: 0;
      }
      .screen-only { display: none !important; }
      .preview-area { padding: 0; }

      .label-grid {
        display: grid;
        /* A4(190mm有効幅) に4列 = 1列約47mm */
        grid-template-columns: repeat(4, 47mm);
        grid-template-rows: repeat(5, 47mm);
        gap: 0;
        width: 188mm;
        margin: 0 auto;
        page-break-inside: auto;
      }
      .label-item {
        width: 47mm;
        height: 47mm;
        border: 0.3pt dashed #aaa; /* トンボ線 */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2mm;
        padding: 3mm;
        page-break-inside: avoid;
        overflow: hidden;
      }
    }

    .label-item canvas {
      /* QRコード: 画面では大きめ、印刷時は2cm角 */
      display: block;
    }
    @media screen {
      .label-item canvas { width: 70px !important; height: 70px !important; }
    }
    @media print {
      .label-item canvas { width: 20mm !important; height: 20mm !important; }
    }

    .label-code {
      font-family: "SF Mono", "Roboto Mono", "Consolas", monospace;
      font-size: 9px;
      font-weight: bold;
      text-align: center;
      color: #222;
      word-break: break-all;
      line-height: 1.3;
    }
    @media print {
      .label-code {
        font-size: 6pt;
      }
    }

    /* ページ区切り(20枚ごと) */
    .page-break {
      page-break-after: always;
    }
    @media screen {
      .page-break { display: none; }
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <div class="header screen-only">
    <h1>🏷️ CO-30 QRラベル印刷</h1>
    <div class="sub">物品に貼り付けるQRコードラベルを印刷します</div>
  </div>

  <!-- フィルターバー -->
  <div class="filter-bar screen-only">
    <select id="f-location"><option value="">拠点: すべて</option></select>
    <select id="f-team">
      <option value="">担当TM: すべて</option>
      <option value="運送">🚛 運送TM</option>
      <option value="レンタル">🏢 レンタルTM</option>
    </select>
    <input type="text" id="f-search" placeholder="🔍 物品コード・物品名で検索">
    <span class="filter-count" id="filter-count"></span>
    <button class="btn-print" onclick="window.print()">🖨️ 印刷</button>
  </div>

  <!-- ローディング -->
  <div class="loading" id="loading">⏳ データを取得中...</div>

  <!-- ラベルプレビュー -->
  <div class="preview-area" id="preview-area" style="display:none;">
    <div class="label-grid" id="label-grid"></div>
  </div>

  <script>
    /* =========================================================
       設定: Apps Script Webアプリの /exec URL
       ========================================================= */
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxNEE_cTr3b_M3yyra5Qd3BON-FXkhPv7Qp22IGrkEEwQq7S8j7p6eWUdalxA-V_eeT/exec";

    let allItems = [];

    /* =========================================================
       データ取得
       ========================================================= */
    async function loadData() {
      try {
        const u = new URL(GAS_API_URL);
        u.searchParams.set('action', 'getInspectionData');
        u.searchParams.set('location', '');
        u.searchParams.set('team', '');
        const res = await fetch(u.toString());
        const json = await res.json();
        // { display: [...], all: [...] } または配列どちらにも対応
        allItems = Array.isArray(json) ? json : (json.all || json.display || []);

        // 重複除去(同一コードは1枚だけ)
        const seen = new Set();
        allItems = allItems.filter(item => {
          if (seen.has(item.code)) return false;
          seen.add(item.code);
          return true;
        });

        buildLocationOptions();
        render();
      } catch (err) {
        document.getElementById('loading').innerText = '❌ データ取得エラー: ' + err.message;
      }
    }

    /* =========================================================
       フィルターの選択肢を構築
       ========================================================= */
    function buildLocationOptions() {
      const locs = Array.from(new Set(allItems.map(i => i.location))).sort();
      const sel = document.getElementById('f-location');
      locs.forEach(loc => {
        const opt = document.createElement('option');
        opt.value = loc;
        opt.textContent = '拠点: ' + loc;
        sel.appendChild(opt);
      });
    }

    /* =========================================================
       フィルタリング
       ========================================================= */
    function getFiltered() {
      const loc    = document.getElementById('f-location').value;
      const team   = document.getElementById('f-team').value;
      const search = document.getElementById('f-search').value.trim().toLowerCase();
      return allItems.filter(item => {
        if (loc    && item.location !== loc)  return false;
        if (team   && item.team    !== team)  return false;
        if (search) {
          const hay = (item.code + ' ' + item.name).toLowerCase();
          if (!hay.includes(search)) return false;
        }
        return true;
      });
    }

    /* =========================================================
       ラベル描画
       ========================================================= */
    async function render() {
      const items = getFiltered();
      document.getElementById('filter-count').textContent = `${items.length} 枚`;
      document.getElementById('loading').style.display = 'none';

      const grid = document.getElementById('label-grid');
      const area = document.getElementById('preview-area');

      if (items.length === 0) {
        area.style.display = 'block';
        grid.innerHTML = '<div class="empty-state">該当する物品がありません</div>';
        return;
      }

      grid.innerHTML = '';
      area.style.display = 'block';

      // 20枚ごとにページ区切りを入れる
      const LABELS_PER_PAGE = 20;

      for (let i = 0; i < items.length; i++) {
        const item = items[i];

        // ラベル要素を作成
        const div = document.createElement('div');
        div.className = 'label-item';

        // QRコード生成(canvas)
        const canvas = document.createElement('canvas');
        try {
          await QRCode.toCanvas(canvas, item.code, {
            width: 70,
            margin: 1,
            errorCorrectionLevel: 'M',
            color: { dark: '#000000', light: '#ffffff' }
          });
        } catch (e) {
          canvas.width = 70;
          canvas.height = 70;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#eee';
          ctx.fillRect(0, 0, 70, 70);
          ctx.fillStyle = '#666';
          ctx.font = '8px sans-serif';
          ctx.fillText('QR ERROR', 5, 35);
        }
        div.appendChild(canvas);

        // 物品コードテキスト
        const code = document.createElement('div');
        code.className = 'label-code';
        code.textContent = item.code;
        div.appendChild(code);

        grid.appendChild(div);

        // 20枚ごとにページ区切り(印刷用)
        if ((i + 1) % LABELS_PER_PAGE === 0 && i + 1 < items.length) {
          const br = document.createElement('div');
          br.className = 'page-break';
          grid.appendChild(br);

          // 新しいグリッドを開始
          const newArea = document.createElement('div');
          newArea.style.paddingTop = '20px';
          area.appendChild(newArea);
        }
      }
    }

    /* =========================================================
       イベントリスナー
       ========================================================= */
    ['f-location', 'f-team'].forEach(id => {
      document.getElementById(id).addEventListener('change', render);
    });
    document.getElementById('f-search').addEventListener('input', render);

    /* =========================================================
       初期化
       ========================================================= */
    loadData();
  </script>
</body>
</html>
