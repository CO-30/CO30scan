<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CO-30 QRラベル印刷</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f7;
      margin: 0; padding: 0;
      color: #333;
    }

    /* ===== 画面表示 ===== */
    .header {
      background: #2c5f8a;
      color: #fff;
      padding: 14px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .header h1 { margin: 0; font-size: 16px; font-weight: bold; }
    .header .sub { font-size: 12px; opacity: 0.8; margin-top: 2px; }

    .filter-bar {
      background: #fff;
      padding: 12px 20px;
      border-bottom: 1px solid #dde3e9;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-bar select,
    .filter-bar input[type="text"] {
      font: inherit;
      font-size: 13px;
      border: 1px solid #dde3e9;
      border-radius: 8px;
      padding: 6px 10px;
      background: #fff;
    }
    .filter-bar input[type="text"] { min-width: 180px; }
    .filter-count { font-size: 12px; color: #888; margin-left: auto; }
    .btn-print {
      background: #2c5f8a; color: #fff;
      border: none; border-radius: 8px;
      padding: 8px 18px; font-size: 14px;
      font-weight: bold; cursor: pointer;
    }
    .btn-print:hover { background: #1d4566; }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #f39c12;
      font-size: 16px;
      font-weight: bold;
    }

    .preview-area { padding: 20px; }

    /* ===== ラベルグリッド(画面) ===== */
    @media screen {
      .label-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        max-width: 900px;
        margin: 0 auto;
      }
      .label-item {
        background: #fff;
        border: 1px dashed #bbb;
        border-radius: 6px;
        padding: 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        min-height: 100px;
      }
    }

    /* ===== 印刷レイアウト ===== */
    @media print {
      @page { size: A4; margin: 8mm; }
      body { background: #fff; margin: 0; padding: 0; }
      .print-hide { display: none !important; }
      .preview-area { padding: 0; }

      .label-grid {
        display: grid;
        grid-template-columns: repeat(4, 47mm);
        gap: 0;
        width: 188mm;
        margin: 0 auto;
      }
      .label-item {
        width: 47mm;
        height: 47mm;
        border: 0.3pt dashed #aaa;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2mm;
        padding: 3mm;
        page-break-inside: avoid;
        overflow: hidden;
      }
    }

    /* ===== QRコード画像 ===== */
    .qr-img {
      display: block;
      border: none;
    }
    @media screen {
      .qr-img { width: 80px; height: 80px; }
    }
    @media print {
      .qr-img { width: 20mm; height: 20mm; }
    }

    /* ===== 物品コードテキスト ===== */
    .label-code {
      font-family: "SF Mono", "Roboto Mono", "Consolas", monospace;
      font-size: 10px;
      font-weight: bold;
      text-align: center;
      color: #222;
      word-break: break-all;
      line-height: 1.3;
    }
    @media print {
      .label-code { font-size: 6pt; }
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <div class="header print-hide">
    <h1>🏷️ CO-30 QRラベル印刷</h1>
    <div class="sub">物品に貼り付けるQRコードラベルを印刷します</div>
  </div>

  <!-- フィルターバー -->
  <div class="filter-bar print-hide">
    <select id="f-location"><option value="">拠点: すべて</option></select>
    <select id="f-team">
      <option value="">担当TM: すべて</option>
      <option value="運送">🚛 運送TM</option>
      <option value="レンタル">🏢 レンタルTM</option>
    </select>
    <input type="text" id="f-search" placeholder="🔍 物品コード・物品名で検索">
    <span class="filter-count" id="filter-count"></span>
    <button class="btn-print" onclick="window.print()">🖨️ 印刷</button>
  </div>

  <!-- ローディング -->
  <div class="loading print-hide" id="loading">⏳ データを取得中...</div>

  <!-- ラベルプレビュー -->
  <div class="preview-area" id="preview-area" style="display:none;">
    <div class="label-grid" id="label-grid"></div>
  </div>

  <script>
    /* =========================================================
       設定
       ========================================================= */
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxNEE_cTr3b_M3yyra5Qd3BON-FXkhPv7Qp22IGrkEEwQq7S8j7p6eWUdalxA-V_eeT/exec";

    let allItems = [];

    /* =========================================================
       データ取得
       ========================================================= */
    async function loadData() {
      try {
        const u = new URL(GAS_API_URL);
        u.searchParams.set('action', 'getInspectionData');
        u.searchParams.set('location', '');
        u.searchParams.set('team', '');
        const res  = await fetch(u.toString());
        const json = await res.json();

        const raw = Array.isArray(json) ? json : (json.all || json.display || []);

        // 同一コードは1枚のみ(重複除去)
        const seen = new Set();
        allItems = raw.filter(item => {
          if (seen.has(item.code)) return false;
          seen.add(item.code);
          return true;
        });

        buildLocationOptions();
        render();
      } catch (err) {
        document.getElementById('loading').innerText = '❌ データ取得エラー: ' + err.message;
      }
    }

    /* =========================================================
       拠点フィルター選択肢を構築
       ========================================================= */
    function buildLocationOptions() {
      const locs = Array.from(new Set(allItems.map(i => i.location).filter(Boolean))).sort();
      const sel  = document.getElementById('f-location');
      locs.forEach(loc => {
        const opt = document.createElement('option');
        opt.value = loc;
        opt.textContent = '拠点: ' + loc;
        sel.appendChild(opt);
      });
    }

    /* =========================================================
       フィルタリング
       ========================================================= */
    function getFiltered() {
      const loc    = document.getElementById('f-location').value;
      const team   = document.getElementById('f-team').value;
      const search = document.getElementById('f-search').value.trim().toLowerCase();
      return allItems.filter(item => {
        if (loc  && item.location !== loc)  return false;
        if (team && item.team    !== team)  return false;
        if (search) {
          const hay = (item.code + ' ' + item.name).toLowerCase();
          if (!hay.includes(search)) return false;
        }
        return true;
      });
    }

    /* =========================================================
       ラベル描画
       QRコードはGoogle Charts APIの画像URLで生成
       (ライブラリ不要・Brave等のブロッカーに影響されない)
       =========================================================  */
    function render() {
      const items = getFiltered();
      document.getElementById('filter-count').textContent = `${items.length} 枚`;
      document.getElementById('loading').style.display = 'none';

      const grid = document.getElementById('label-grid');
      const area = document.getElementById('preview-area');
      grid.innerHTML = '';

      if (items.length === 0) {
        area.style.display = 'block';
        grid.innerHTML = '<div class="empty-state">該当する物品がありません</div>';
        return;
      }

      area.style.display = 'block';

      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'label-item';

        // QRコード画像(Google Charts API)
        // chs=サイズ / cht=qr(QRコード) / chl=内容 / choe=文字コード
        const qrUrl = 'https://chart.googleapis.com/chart'
          + '?cht=qr'
          + '&chs=200x200'
          + '&choe=UTF-8'
          + '&chl=' + encodeURIComponent(item.code);

        const img = document.createElement('img');
        img.src = qrUrl;
        img.alt = item.code;
        img.className = 'qr-img';
        img.onerror = function() {
          // 画像取得失敗時はエラーテキストを表示
          this.style.display = 'none';
          const err = document.createElement('div');
          err.style.cssText = 'width:80px;height:80px;background:#eee;display:flex;align-items:center;justify-content:center;font-size:9px;color:#888;text-align:center;';
          err.textContent = 'QR取得失敗';
          div.insertBefore(err, div.firstChild);
        };
        div.appendChild(img);

        // 物品コード
        const code = document.createElement('div');
        code.className = 'label-code';
        code.textContent = item.code;
        div.appendChild(code);

        grid.appendChild(div);
      });
    }

    /* =========================================================
       イベント
       ========================================================= */
    ['f-location', 'f-team'].forEach(id => {
      document.getElementById(id).addEventListener('change', render);
    });
    document.getElementById('f-search').addEventListener('input', render);

    /* =========================================================
       初期化
       ========================================================= */
    loadData();
  </script>
</body>
</html>
